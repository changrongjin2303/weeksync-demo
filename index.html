<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <title>WeekSync PDCA 周计划协作系统 - 原型演示</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>

  <style>
    :root {
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --success-soft: #dcfce7;
      --warning: #d97706;
      --warning-soft: #fef3c7;
      --danger: #dc2626;
      --danger-soft: #fee2e2;
      --violet: #7c3aed;
      --violet-soft: #ede9fe;
      --cyan: #0891b2;
      --cyan-soft: #cffafe;
      --bg: #f1f5f9;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --text: #0f172a;
      --text-2: #475569;
      --text-3: #94a3b8;
      --border: #e2e8f0;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow: 0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
      --radius: 12px;
      --radius-sm: 8px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { background: linear-gradient(135deg, #f0f4ff 0%, #f1f5f9 50%, #f5f3ff 100%); color: var(--text); font-family: -apple-system, "PingFang SC", "Segoe UI", Roboto, sans-serif; min-height: 100%; }
    body { max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; border-left: 1px solid rgba(0,0,0,0.04); border-right: 1px solid rgba(0,0,0,0.04); box-shadow: 0 0 60px rgba(0,0,0,0.06); overflow-x: hidden; }
    button, input, textarea, select { font: inherit; }
    button { border: none; background: none; cursor: pointer; }
    input, textarea, select { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; width: 100%; outline: none; transition: border-color 0.2s; background: var(--surface); }
    input:focus, textarea:focus, select:focus { border-color: var(--primary); }
    a { text-decoration: none; color: inherit; }

    /* App Shell */
    .app-shell { min-height: 100vh; padding-top: 56px; padding-bottom: calc(68px + var(--safe-bottom)); }

    /* Header */
    .header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; max-width: 430px; margin: 0 auto; height: 56px; display: flex; align-items: center; padding: 0 16px; background: rgba(255,255,255,0.92); backdrop-filter: blur(20px) saturate(180%); border-bottom: 1px solid rgba(0,0,0,0.06); }
    .header-back { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; margin-right: 8px; color: var(--text-2); }
    .header-back:active { background: var(--bg); }
    .header-center { flex: 1; min-width: 0; }
    .header-title { font-size: 17px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-sub { font-size: 12px; color: var(--text-3); }
    .header-action { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 10px; position: relative; }
    .header-action:active { background: var(--bg); }
    .badge-dot { position: absolute; top: 6px; right: 6px; width: 8px; height: 8px; background: var(--danger); border-radius: 50%; border: 2px solid white; }

    /* Bottom Tab Bar */
    .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; max-width: 430px; margin: 0 auto; background: rgba(255,255,255,0.96); backdrop-filter: blur(20px); border-top: 1px solid rgba(0,0,0,0.06); padding-bottom: var(--safe-bottom); display: flex; }
    .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 0 6px; gap: 2px; color: var(--text-3); transition: color 0.2s; position: relative; }
    .tab-item.active { color: var(--primary); }
    .tab-item .tab-icon { font-size: 22px; line-height: 1; }
    .tab-item .tab-label { font-size: 10px; font-weight: 500; }
    .tab-badge { position: absolute; top: 2px; right: 50%; transform: translateX(16px); min-width: 16px; height: 16px; background: var(--danger); color: white; font-size: 10px; font-weight: 600; border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }

    /* Page Content */
    .page { padding: 16px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    /* Cards */
    .card { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow-sm); }
    .card-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .card-title .icon { font-size: 18px; }

    /* Stat Cards */
    .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
    .stat-card { background: var(--surface); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow-sm); position: relative; overflow: hidden; }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .stat-card.blue::before { background: var(--primary); }
    .stat-card.green::before { background: var(--success); }
    .stat-card.orange::before { background: var(--warning); }
    .stat-card.violet::before { background: var(--violet); }
    .stat-card.red::before { background: var(--danger); }
    .stat-card.cyan::before { background: var(--cyan); }
    .stat-label { font-size: 12px; color: var(--text-3); margin-bottom: 6px; }
    .stat-value { font-size: 26px; font-weight: 700; line-height: 1; }
    .stat-value.blue { color: var(--primary); }
    .stat-value.green { color: var(--success); }
    .stat-value.orange { color: var(--warning); }
    .stat-value.violet { color: var(--violet); }
    .stat-value.red { color: var(--danger); }
    .stat-value.cyan { color: var(--cyan); }

    /* Quick Actions Grid */
    .quick-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
    .quick-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 14px 4px; background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-sm); transition: transform 0.15s; }
    .quick-btn:active { transform: scale(0.95); }
    .quick-btn .qicon { font-size: 26px; }
    .quick-btn .qlabel { font-size: 11px; color: var(--text-2); font-weight: 500; }

    /* Status Badges */
    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .badge-draft { background: #f1f5f9; color: #64748b; }
    .badge-submitted { background: var(--warning-soft); color: var(--warning); }
    .badge-returned { background: var(--danger-soft); color: var(--danger); }
    .badge-approved { background: var(--primary-soft); color: var(--primary); }
    .badge-reviewed { background: var(--success-soft); color: var(--success); }
    .badge-high { background: var(--danger-soft); color: var(--danger); }
    .badge-medium { background: var(--warning-soft); color: var(--warning); }
    .badge-low { background: var(--cyan-soft); color: var(--cyan); }

    /* Task Status */
    .task-status { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .ts-todo { background: #f1f5f9; color: #64748b; }
    .ts-progress { background: var(--primary-soft); color: var(--primary); }
    .ts-done { background: var(--success-soft); color: var(--success); }

    /* List Items */
    .list-item { background: var(--surface); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; box-shadow: var(--shadow-sm); transition: transform 0.15s; cursor: pointer; }
    .list-item:active { transform: scale(0.98); }
    .list-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .list-item-title { font-size: 15px; font-weight: 600; flex: 1; min-width: 0; }
    .list-item-meta { display: flex; gap: 12px; font-size: 12px; color: var(--text-3); margin-top: 4px; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; background: var(--bg); border-radius: 10px; padding: 3px; margin-bottom: 16px; overflow-x: auto; }
    .tab { flex: 1; text-align: center; padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--text-3); white-space: nowrap; transition: all 0.2s; }
    .tab.active { background: var(--surface); color: var(--primary); box-shadow: var(--shadow-sm); font-weight: 600; }

    /* Progress Bar */
    .progress-bar { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; transition: all 0.15s; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-warning { background: var(--warning); color: white; }
    .btn-outline { border: 1.5px solid var(--border); color: var(--text-2); background: var(--surface); }
    .btn-block { width: 100%; }
    .btn-sm { padding: 6px 14px; font-size: 13px; }
    .btn-group { display: flex; gap: 8px; margin-top: 12px; }

    /* Timeline */
    .timeline { padding-left: 24px; position: relative; }
    .timeline::before { content: ''; position: absolute; left: 8px; top: 8px; bottom: 8px; width: 2px; background: var(--border); }
    .tl-item { position: relative; padding-bottom: 20px; padding-left: 20px; }
    .tl-dot { position: absolute; left: -20px; top: 4px; width: 16px; height: 16px; border-radius: 50%; border: 3px solid var(--border); background: white; }
    .tl-dot.done { border-color: var(--success); background: var(--success); }
    .tl-dot.active { border-color: var(--primary); background: var(--primary); animation: pulse 2s infinite; }
    .tl-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .tl-desc { font-size: 12px; color: var(--text-3); }

    /* Modal / Drawer */
    .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.5); display: flex; align-items: flex-end; justify-content: center; animation: fadeIn 0.2s ease; }
    .modal-content { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 430px; max-height: 85vh; overflow-y: auto; padding: 20px 16px calc(20px + var(--safe-bottom)); animation: slideUp 0.3s ease; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-title { font-size: 17px; font-weight: 700; }
    .modal-close { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--bg); font-size: 18px; }

    /* Role Selector */
    .role-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 20px 16px; }
    .role-card { background: var(--surface); border-radius: 16px; padding: 20px 16px; text-align: center; box-shadow: var(--shadow); transition: all 0.2s; cursor: pointer; border: 2px solid transparent; }
    .role-card:active { transform: scale(0.97); }
    .role-card.selected { border-color: var(--primary); }
    .role-icon { font-size: 40px; margin-bottom: 10px; }
    .role-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .role-desc { font-size: 12px; color: var(--text-3); line-height: 1.4; }

    /* Week Selector */
    .week-selector { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 16px; box-shadow: var(--shadow-sm); }
    .week-nav { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 18px; color: var(--text-2); }
    .week-nav:active { background: var(--bg); }
    .week-label { font-size: 15px; font-weight: 600; text-align: center; }
    .week-date { font-size: 11px; color: var(--text-3); text-align: center; }

    /* Section Title */
    .section-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

    /* Alert Banner */
    .alert { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border-radius: var(--radius-sm); margin-bottom: 12px; font-size: 13px; line-height: 1.5; }
    .alert-warning { background: var(--warning-soft); color: #92400e; }
    .alert-danger { background: var(--danger-soft); color: #991b1b; }
    .alert-info { background: var(--primary-soft); color: #1e40af; }
    .alert-success { background: var(--success-soft); color: #166534; }

    /* Task List in Plan */
    .task-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px; background: var(--surface-soft); border-radius: var(--radius-sm); margin-bottom: 8px; border: 1px solid var(--border); }
    .task-check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; cursor: pointer; transition: all 0.2s; }
    .task-check.done { background: var(--success); border-color: var(--success); color: white; }
    .task-check.progress { background: var(--primary); border-color: var(--primary); color: white; }
    .task-body { flex: 1; min-width: 0; }
    .task-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .task-info { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }

    /* Evaluation Stars */
    .stars { display: inline-flex; gap: 2px; }
    .star { color: #e2e8f0; font-size: 16px; cursor: pointer; }
    .star.filled { color: #f59e0b; }

    /* Toast */
    .toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); z-index: 300; background: var(--text); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 500; box-shadow: var(--shadow-lg); animation: fadeIn 0.3s ease; white-space: nowrap; }

    /* Empty State */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-3); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; }

    /* Work Log */
    .log-entry { padding: 12px; background: var(--surface-soft); border-radius: var(--radius-sm); margin-bottom: 8px; border-left: 3px solid var(--primary); }
    .log-time { font-size: 11px; color: var(--text-3); margin-bottom: 4px; }
    .log-content { font-size: 14px; line-height: 1.6; }

    /* Chart placeholder */
    .chart-placeholder { background: var(--surface-soft); border-radius: var(--radius-sm); height: 200px; display: flex; align-items: center; justify-content: center; color: var(--text-3); margin-bottom: 12px; overflow: hidden; position: relative; }
    .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 160px; padding: 0 20px; width: 100%; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .bar { width: 100%; border-radius: 4px 4px 0 0; transition: height 0.6s ease; }
    .bar-label { font-size: 10px; color: var(--text-3); }

    /* Donut chart */
    .donut-chart { width: 140px; height: 140px; border-radius: 50%; position: relative; margin: 0 auto; }
    .donut-center { position: absolute; inset: 30px; background: var(--surface); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .donut-value { font-size: 24px; font-weight: 700; }
    .donut-label { font-size: 11px; color: var(--text-3); }

    /* Table */
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th { text-align: left; padding: 8px 10px; background: var(--bg); color: var(--text-3); font-weight: 500; border-bottom: 1px solid var(--border); }
    .data-table td { padding: 10px; border-bottom: 1px solid var(--border); }

    /* Transition groups */
    .fade-enter-active, .fade-leave-active { transition: opacity 0.2s; }
    .fade-enter-from, .fade-leave-to { opacity: 0; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 0; }

    /* Skeleton */
    .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-sm); }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Workspace toggle */
    .workspace-bar { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 8px 16px; margin-bottom: 12px; }
    .ws-btn { padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; color: var(--text-3); background: var(--surface); border: 1px solid var(--border); transition: all 0.2s; }
    .ws-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    /* Score display */
    .score-circle { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: white; }

    /* AI Report */
    .ai-card { background: linear-gradient(135deg, #ede9fe 0%, #dbeafe 100%); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
    .ai-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .ai-tag { background: var(--violet); color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }

    /* Notification item */
    .notif-item { display: flex; gap: 12px; padding: 14px; background: var(--surface); border-radius: var(--radius); margin-bottom: 8px; box-shadow: var(--shadow-sm); cursor: pointer; }
    .notif-item.unread { border-left: 3px solid var(--primary); }
    .notif-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .notif-body { flex: 1; min-width: 0; }
    .notif-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .notif-desc { font-size: 12px; color: var(--text-3); }
    .notif-time { font-size: 11px; color: var(--text-3); margin-top: 4px; }
  </style>
</head>

// Helpers
function getWeekCode(offset) {
  const d = new Date(2026, 2, 12); // 2026-03-12
  d.setDate(d.getDate() + offset * 7);
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const days = Math.floor((d - jan1) / 86400000);
  const weekNum = Math.ceil((days + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(weekNum).padStart(2, '0')}`;
}

function getWeekRange(offset) {
  const d = new Date(2026, 2, 9); // Monday of W11
  d.setDate(d.getDate() + offset * 7);
  const end = new Date(d);
  end.setDate(end.getDate() + 6);
  const fmt = (dt) => `${dt.getMonth()+1}/${dt.getDate()}`;
  return `${fmt(d)} - ${fmt(end)}`;
}

function toast(msg) {
  store.toastMsg = msg;
  clearTimeout(store.toastTimer);
  store.toastTimer = setTimeout(() => { store.toastMsg = ''; }, 2000);
}

function currentUser() {
  const roleMap = { EMPLOYEE: 1, MANAGER: 3, HR: 4, BOSS: 5, ADMIN: 6 };
  return store.users.find(u => u.id === roleMap[store.currentRole]) || store.users[0];
}

function statusLabel(s) {
  return { draft: '草稿', submitted: '待审核', returned: '已退回', approved: '已通过', reviewed: '已复盘' }[s] || s;
}
function priorityLabel(p) {
  return { high: '高', medium: '中', low: '低' }[p] || p;
}
function taskStatusLabel(s) {
  return { todo: '待开始', progress: '进行中', done: '已完成' }[s] || s;

function sourceLabel(s) {
  return { original: '原始', midweek: '周中新增', manager: '主管添加', reviewer: '评审添加', carryover: '上周遗留' }[s] || s;

      return store.workLogs.filter(l => l.userId === this.user.id).length;
    },
    unreadCount() {
      return store.notifications.filter(n => n.unread && (!n.forRole || n.forRole === store.currentRole)).length;
    },
    planStatusHeadline() {
      if (!this.currentPlan) return '本周尚未创建计划';
      const s = this.currentPlan.status;
      if (s === 'draft') return '本周计划草稿待提交';
      if (s === 'submitted') return '计划已提交，等待审批';
      if (s === 'returned') return '计划已被退回，请修改';
      if (s === 'approved') return '计划已审批，正在执行中';
      if (s === 'reviewed') return '本周闭环已进入复盘阶段';
      return '本周计划进行中';
    },
    planStatusDesc() {
      if (!this.currentPlan) return '前往计划页创建本周计划，开始 PDCA 闭环。';
      const s = this.currentPlan.status;
      if (s === 'draft') return '请完善任务并提交，等待主管审批。';
      if (s === 'submitted') return '计划已提交，请等待主管审批通过。';
      if (s === 'returned') return '请查看退回意见并修改后重新提交。';
      if (s === 'approved') return '专注任务执行，完成后可申请主管评估。';
      if (s === 'reviewed') return '本周计划已完成评估，可以查看复盘内容和历史沉淀。';
      return '';
    },
    workflowSteps() {
      const p = this.currentPlan;
      const step = p ? { draft:1, submitted:2, returned:1, approved:3, reviewed:5 }[p.status] || 1 : 0;
      return [
        { label: '计划', done: step > 1, active: step === 1 },
        { label: step >= 3 ? '已审批' : '审批', done: step > 2, active: step === 2 },
        { label: '执行', done: step > 3, active: step === 3 },
        { label: step >= 5 ? '已评估' : '评估', done: step > 4, active: step === 4 },
        { label: '复盘', done: step >= 5, active: false },
      ];
    },
    todoQueues() {
      const myId = currentUser().id;
      const week = store.selectedWeek;
      const pendingApprove = store.plans.filter(p => p.weekCode === week && p.status === 'submitted' && p.userId !== myId).length;
      const pendingEval = store.plans
        .filter(p => p.weekCode === week && p.status === 'approved' && p.userId !== myId)
        .flatMap(p => p.tasks).filter(t => t.status === 'done' && !t.reviewResult).length;
      const collabReceipts = store.plans.flatMap(p => p.tasks).filter(t => t.collabStatus === 'receipt_submitted').length;
      return [
        { key: 'approve',  label: '待审批',  count: pendingApprove, color: 'var(--warning)', detail: pendingApprove + '条计划待审批', link: '/plans' },
        { key: 'evaluate', label: '待评估',  count: pendingEval,    color: 'var(--success)', detail: pendingEval + '项任务待评估', link: '/plans' },
        { key: 'duedate',  label: '待改期',  count: 1,              color: 'var(--violet)',  detail: '1条改期审批待处理' },
        { key: 'collab',   label: '协办回执', count: collabReceipts, color: 'var(--cyan)',    detail: collabReceipts > 0 ? collabReceipts + '条协办回执待查看' : '暂无协办', link: '/plans' },
      ];
    }
  },
  methods: {
    switchOrg() {
      store.workspace = 'organization';
      this.$router.push('/boss/dashboard');
    }
  }
};

  `,
  data() { return { showReturnModal: false, showEvalModal: false, evalTask: null, evalResult: 'completed', evalScore: 8, evalComment: '本周任务完成质量较好，按时交付，后续继续保持。', comment: '任务描述过于笼统，请具体说明各任务的可交付物，并补充完成标准', showAddTask: false, showAddTaskModal: false, expandedTaskId: null, expandedAuxId: null, showCollabModal: false, collabTask: null, collabDept: 4, collabNote: '需要行政人事中心配合，协助联系外部访谈对象并提供客户联系名单，预计需要2个工作日完成对接工作', showCollabReceiptModal: false, showAssignHandlerModal: false, collabHandlerName: '李明（行政专员）', collabReceiptNote: '行政人事中心将全力配合，已安排专员联系相关客户，预计3月15日前完成名单对接并提供详细清单。', newTaskType: 'midweek', newTaskTitle: '', newTaskPriority: 'medium', newTaskProject: '', newTaskDue: '2026-03-15', newTaskDesc: '', newTaskDeliverable: '', newTaskReviewer: '吴文建', editingTaskId: null, editTitle: '', editDue: '', editPriority: '' }; },
  computed: {
    plan() { return store.plans.find(p => p.id === parseInt(this.$route.params.id)); },
    isManagerViewing() { return store.currentRole === 'MANAGER' || store.currentRole === 'BOSS'; },
    isOwnPlan() { return this.plan && this.plan.userId === currentUser().id; },
    doneCount() { return this.plan ? this.plan.tasks.filter(t => t.status === 'done').length : 0; },
    completionRate() { return this.plan && this.plan.tasks.length ? Math.round(this.doneCount / this.plan.tasks.length * 100) : 0; },
    canEdit() {
      if (!this.plan) return false;
      return this.isOwnPlan && (this.plan.status === 'draft' || this.plan.status === 'returned');
    },
    canSubmit() {
      if (!this.plan) return false;
      return this.isOwnPlan && (this.plan.status === 'draft' || this.plan.status === 'returned');
    },
    canApprove() {
      if (!this.plan) return false;
      return this.isManagerViewing && !this.isOwnPlan && this.plan.status === 'submitted';
    },
    canAddTask() {
      if (!this.plan) return false;
      if (this.canEdit) return true;
      if (this.isManagerViewing && !this.isOwnPlan && (this.plan.status === 'submitted' || this.plan.status === 'approved')) return true;
      return false;
    },
    canEditTask() {
      if (!this.plan) return false;
      return this.isManagerViewing && !this.isOwnPlan && (this.plan.status === 'submitted' || this.plan.status === 'approved');
    },
    canEvaluate() {
      if (!this.plan) return false;
      return this.isManagerViewing && !this.isOwnPlan && this.plan.status === 'approved';
    },
    allEvaluated() {
      if (!this.plan) return false;
      const doneTasks = this.plan.tasks.filter(t => t.status === 'done');
      return doneTasks.length > 0 && doneTasks.every(t => t.reviewResult);
    },
    allTasksDone() {
      if (!this.plan || !this.plan.tasks.length) return false;
      return this.plan.tasks.every(t => t.status === 'done');
    },
    highPriorityCount() {
      if (!this.plan) return 0;
      return this.plan.tasks.filter(t => t.priority === 'high').length;
    },
    highPriorityOpenCount() {
      if (!this.plan) return 0;
      return this.plan.tasks.filter(t => t.priority === 'high' && t.status !== 'done').length;
    },
    pendingEvalTaskCount() {
      if (!this.plan) return 0;
      return this.plan.tasks.filter(t => t.status === 'done' && !t.reviewResult).length;
    },
    l1Depts() { return store.departments.filter(d => !d.parentId); },
    isHRViewing() { return store.currentRole === 'HR'; },
    nextStepIcon() {
      if (!this.plan) return '📝';
      if (this.canApprove) return '👆';
      if (this.canEvaluate) return '⭐';
      const s = this.plan.status;
      if (s === 'draft') return '📝';
      if (s === 'submitted') return '⏳';
      if (s === 'returned') return '↩️';
      if (s === 'approved') return '⚡';
      if (s === 'reviewed') return '🎉';
      return '📋';
    },
    nextStepDesc() {
      if (!this.plan) return '';
      if (this.canApprove) return '请先核查任务清单，可编辑任务内容，再决定审批通过或退回修改。';
      if (this.canEvaluate) {
        if (this.pendingEvalTaskCount > 0) return '有 ' + this.pendingEvalTaskCount + ' 项任务已完成，请及时进行结果评估。';
        return '等待员工完成任务，完成后将在此处发起结果评估。';
      }
      const s = this.plan.status;
      if (s === 'draft') return '请完善任务清单后提交审核，主管将收到审批通知。';
      if (s === 'submitted') return '计划已提交，等待主管审批通过后即可开始执行。';
      if (s === 'returned') return '计划已被退回，请查看上方退回原因，修改后重新提交。';
      if (s === 'approved') return '任务执行中，更新任务状态为已完成，主管将收到评估通知。';
      if (s === 'reviewed') return '本周已完成复盘，可前往复盘页查看沉淀内容。';
      return '';
    },
    pendingCollabTask() {
      if (!this.plan) return null;
      return this.plan.tasks.find(t => t.collabStatus === 'pending_hr') || null;
    },
    completedCollabTask() {
      if (!this.plan) return null;
      return this.plan.tasks.find(t => t.collabStatus === 'receipt_submitted') || null;
    },
    acceptedCollabTask() {
      if (!this.plan) return null;
      return this.plan.tasks.find(t => t.collabStatus === 'accepted') || null;
    },
    collabDeptManager() {
      if (!this.collabDept) return '';
      const dept = store.departments.find(d => d.id === this.collabDept);
      if (!dept) return '';
      const mgr = store.users.find(u => (u.role === 'MANAGER' || u.role === 'BOSS') && u.deptId === this.collabDept);
      return mgr ? mgr.name + '（' + dept.name + '）' : dept.name + ' 负责人';
    }
  },
  methods: {
    statusLabel, priorityLabel, sourceLabel, taskStatusLabel,
    priorityStars(priority) { return priority === 'high' ? 5 : priority === 'medium' ? 4 : 3; },
    openCollab(t) {
      this.collabTask = t;
      this.collabDept = 4;
      this.collabNote = '需要行政人事中心配合，协助联系外部访谈对象并提供客户联系名单，预计需要2个工作日完成对接工作';
      this.showCollabModal = true;
    },
    submitCollab() {
      if (this.collabTask) {
        this.collabTask.collabStatus = 'pending_hr';
        this.collabTask.collabNote = this.collabNote;
        const deptName = this.collabDeptManager || '行政人事中心';
        toast('✈ 协办已发起，已通知 ' + deptName + ' 接收');
        store.notifications.unshift({ id: Date.now(), forRole: 'HR', type: 'collab_request', title: '收到协办申请', desc: currentUser().name + '发起协办：「' + this.collabTask.title + '」，请查看并接收', time: '刚刚', unread: true, icon: '✈', iconBg: '#f0f9ff', link: '/plans/' + this.plan.id });
        store.notifications.unshift({ id: Date.now()+1, forRole: 'MANAGER', type: 'collab_sent', title: '协办申请已发出', desc: '已向' + deptName + '发起协办：「' + this.collabTask.title + '」，等待对方接收', time: '刚刚', unread: true, icon: '✈', iconBg: '#f0f9ff', link: '/plans/' + this.plan.id });
        this.expandedAuxId = null;
      }
      this.showCollabModal = false;
      this.collabNote = '需要行政人事中心配合，协助联系外部访谈对象并提供客户联系名单，预计需要2个工作日完成对接工作';
      this.collabDept = 4;
    },
    addTaskFromModal() {
      if (!this.newTaskTitle.trim() || !this.newTaskDue || !this.newTaskDesc || !this.newTaskDeliverable) return;
      this.plan.tasks.push({
        id: Date.now(), title: this.newTaskTitle, project: this.newTaskProject || null, priority: this.newTaskPriority,
        status: 'todo', source: this.newTaskType === 'midweek' ? 'midweek' : 'original',
        dueDate: this.newTaskDue.replace('2026-', ''), description: this.newTaskDesc,
        deliverable: this.newTaskDeliverable, reviewResult: null, score: null
      });
      this.newTaskTitle = ''; this.newTaskProject = ''; this.newTaskPriority = 'medium';
      this.newTaskDue = '2026-03-15'; this.newTaskDesc = ''; this.newTaskDeliverable = '';
      this.showAddTaskModal = false;
      toast('✅ 任务已添加');
    },
    cycleStatus(t) {
      if (this.isManagerViewing && !this.isOwnPlan) return;
      if (t.status === 'todo') t.status = 'progress';
      else if (t.status === 'progress') {
        t.status = 'done';
        if (this.isOwnPlan && this.plan && this.plan.status === 'approved') {
          store.notifications.unshift({ id: Date.now(), forRole: 'MANAGER', type: 'task_done', title: '任务已完成待评估', desc: (this.plan.userName || '员工') + '「' + t.title + '」已标记完成，待您进行结果评估', time: '刚刚', unread: true, icon: '⭐', iconBg: 'var(--violet-soft)', link: '/plans/' + this.plan.id });
        }
      }
      else t.status = 'todo';
    },
    startEditTask(t) {
      this.editingTaskId = t.id;
      this.editTitle = t.title;
      this.editDue = t.dueDate;
      this.editPriority = t.priority;
    },
    saveEditTask(t) {
      t.title = this.editTitle;
      t.dueDate = this.editDue;
      t.priority = this.editPriority;
      this.editingTaskId = null;
      toast('✅ 任务已更新');
    },
    addTask() {
      if (!this.newTaskTitle.trim()) return;
      this.plan.tasks.push({
        id: Date.now(), title: this.newTaskTitle, project: this.newTaskProject || null, priority: this.newTaskPriority,
        status: 'todo', source: this.isManagerViewing && !this.isOwnPlan ? 'manager' : 'midweek', dueDate: this.newTaskDue,
        difficulty: 5, deliverable: '', reviewResult: null, score: null
      });
      this.newTaskTitle = ''; this.newTaskProject = ''; this.newTaskPriority = 'medium'; this.newTaskDue = '03-14';
      this.showAddTask = false;
      toast('✅ 任务已添加');
    },
    openEval(t) {
      this.evalTask = t;
      this.evalResult = 'completed';
      this.evalScore = 8;
      this.evalComment = '本周任务完成质量较好，按时交付，后续继续保持。';
      this.showEvalModal = true;
    },
    submitEval() {
      if (this.evalTask) {
        this.evalTask.reviewResult = this.evalResult;
        this.evalTask.score = this.evalScore;
        const resultLabel = { completed:'已完成', incomplete:'未完成', authorized_delay:'获权延期' }[this.evalResult] || this.evalResult;
        toast('✅ 已评估：' + this.evalTask.title);
        store.notifications.unshift({ id: Date.now(), forRole: 'EMPLOYEE', type: 'eval_done', title: '任务评估完成', desc: '「' + this.evalTask.title + '」已完成评估，得分' + this.evalScore + '分，结果：' + resultLabel, time: '刚刚', unread: true, icon: '⭐', iconBg: 'var(--violet-soft)', link: '/plans/' + this.plan.id });
      }
      this.showEvalModal = false;
    },
    rejectCompletion(t) {
      t.status = 'progress';
      toast('↩️ 已驳回完成，任务退回进行中');
    },
    submitPlan() {
      this.plan.status = 'submitted';
      this.plan.submittedAt = '03-12 ' + new Date().toTimeString().slice(0,5);
      toast('✅ 计划已提交审核，等待主管审批');
      store.auditLogs.unshift({ id: Date.now(), type: 'submit', content: this.plan.userName + ' 提交了 ' + this.plan.weekCode + ' 周计划', time: '03-12 ' + new Date().toTimeString().slice(0,5) });
      store.notifications.unshift({ id: Date.now()+1, forRole: 'MANAGER', type: 'plan_submitted', title: this.plan.userName + '提交了周计划', desc: this.plan.weekCode + '周计划等待审核，共' + this.plan.tasks.length + '个任务，请及时处理', time: '刚刚', unread: true, icon: '📋', iconBg: 'var(--primary-soft)', link: '/plans/' + this.plan.id });
    },
    approvePlan() {
      this.plan.status = 'approved';
      this.plan.approvedBy = currentUser().name;
      toast('✅ 计划已审批通过');
      store.auditLogs.unshift({ id: Date.now(), type: 'approve', content: currentUser().name + ' 审批通过了 ' + this.plan.userName + ' 的周计划', time: '03-12 ' + new Date().toTimeString().slice(0,5) });
      store.notifications.unshift({ id: Date.now()+1, forRole: 'EMPLOYEE', type: 'plan_approved', title: '周计划审批通过', desc: currentUser().name + '已审批通过您的' + this.plan.weekCode + '周计划，可以开始执行', time: '刚刚', unread: true, icon: '✅', iconBg: 'var(--success-soft)', link: '/plans/' + this.plan.id });
    },
    returnPlan() {
      this.plan.status = 'returned';
      this.plan.returnComment = this.comment;
      this.showReturnModal = false;
      toast('↩️ 计划已退回，已通知员工修改');
      store.auditLogs.unshift({ id: Date.now(), type: 'return', content: currentUser().name + ' 退回了 ' + this.plan.userName + ' 的周计划，原因：' + this.comment, time: '03-12 ' + new Date().toTimeString().slice(0,5) });
      store.notifications.unshift({ id: Date.now()+1, forRole: 'EMPLOYEE', type: 'plan_returned', title: '周计划已被退回修改', desc: currentUser().name + '退回了您的' + this.plan.weekCode + '周计划：' + this.comment, time: '刚刚', unread: true, icon: '↩️', iconBg: '#fef2f2', link: '/plans/' + this.plan.id });
    },
    completePlanReview() {
      this.plan.status = 'reviewed';
      toast('📊 复盘评价已完成');
      store.auditLogs.unshift({ id: Date.now(), type: 'review', content: currentUser().name + ' 完成了 ' + this.plan.userName + ' ' + this.plan.weekCode + ' 的复盘评价', time: '03-12 ' + new Date().toTimeString().slice(0,5) });
    },
    acceptCollab(t) {
      this.collabTask = t;
      this.collabHandlerName = '李明（行政专员）';
      this.showAssignHandlerModal = true;
    },
    assignCollabHandler() {
      const t = this.collabTask;
      if (t) {
        t.collabStatus = 'accepted';
        t.collabHandler = this.collabHandlerName;
        store.notifications.unshift({ id: Date.now(), forRole: 'MANAGER', type: 'collab_accepted', title: '协办已接收，经办人已指派', desc: '行政人事中心已接收协办：「' + t.title + '」，经办人：' + this.collabHandlerName + '，将尽快推进', time: '刚刚', unread: true, icon: '✈', iconBg: '#eff6ff', link: this.$route.fullPath });
        toast('✅ 已接收协办并指派经办人：' + this.collabHandlerName);
      }
      this.showAssignHandlerModal = false;
    },
    openCollabReceipt(t) {
      this.collabTask = t;
      this.showCollabReceiptModal = true;
    },
    submitCollabReceipt() {
      const t = this.collabTask || this.acceptedCollabTask;
      if (t) {
        t.collabStatus = 'receipt_submitted';
        t.collabReceipt = this.collabReceiptNote;
        const handlerInfo = t.collabHandler ? '（经办人：' + t.collabHandler + '）' : '';
        store.notifications.unshift({ id: Date.now(), forRole: 'MANAGER', type: 'collab_receipt', title: '协办回执已提交', desc: '行政人事中心已完成协办工作' + handlerInfo + '，请查看回执', time: '刚刚', unread: true, icon: '✅', iconBg: 'var(--success-soft)', link: this.$route.fullPath });
        toast('✅ 协办回执已提交，已通知主管');
      }
      this.showCollabReceiptModal = false;
    }
  }
};

  computed: {
    currentPlan() {
      const uid = currentUser().id;
      return store.plans.find(p => p.userId === uid && p.weekCode === '2026-W11');
    },
    canUpdateStatus() { return this.currentPlan && this.currentPlan.status === 'approved'; },
    allTasks() { return this.currentPlan ? this.currentPlan.tasks : []; },
    totalCount() { return this.allTasks.length; },
    todoCount() { return this.allTasks.filter(t => t.status === 'todo').length; },
    progressCount() { return this.allTasks.filter(t => t.status === 'progress').length; },
    doneCount() { return this.allTasks.filter(t => t.status === 'done').length; },
    allTasksDone() { return this.totalCount > 0 && this.doneCount === this.totalCount; },
    pendingEvalCount() {
      const plans = store.plans.filter(p => p.status === 'approved' && p.userId !== currentUser().id);
      let count = 0;
      plans.forEach(p => { count += p.tasks.filter(t => t.status === 'done' && !t.reviewResult).length; });
      return count;
    },
    pendingEvalTask() {
      const plans = store.plans.filter(p => p.status === 'approved' && p.userId !== currentUser().id);
      for (const p of plans) {
        const t = p.tasks.find(t => t.status === 'done' && !t.reviewResult);
        if (t) return t.title;
      }
      return '';
    },
    filteredTasks() {
      let tasks = this.allTasks;
      if (this.statusFilter !== 'all') tasks = tasks.filter(t => t.status === this.statusFilter);
      const pRank = { high: 0, medium: 1, low: 2 };
      return [...tasks].sort((a, b) => (pRank[a.priority] || 1) - (pRank[b.priority] || 1));
    },
    filterOptions() {
      return [
        { value: 'all', label: '全部' }, { value: 'todo', label: '待开始' },
        { value: 'progress', label: '执行中' }, { value: 'done', label: '已完成' },
      ];
    },
    statusOptions() {
      return [
        { value: 'todo', label: '待开始', activeBg: '#f1f5f9', activeColor: 'var(--text-2)', borderColor: 'var(--border)' },
        { value: 'progress', label: '执行中', activeBg: 'var(--primary-soft)', activeColor: 'var(--primary)', borderColor: '#93c5fd' },
        { value: 'done', label: '已完成', activeBg: 'var(--success-soft)', activeColor: 'var(--success)', borderColor: '#86efac' },
      ];
    },
    todayLogs() { return store.workLogs.filter(l => l.userId === currentUser().id).slice(0, 5); }
  },
  methods: {
    taskStatusLabel, priorityLabel,
    priorityStars(p) { return p === 'high' ? 5 : p === 'medium' ? 4 : 3; },
    canAdvanceTo(currentStatus, targetStatus) {
      const order = ['todo', 'progress', 'done'];
      return order.indexOf(targetStatus) === order.indexOf(currentStatus) + 1;
    },
    changeStatus(t, newStatus) {
      if (!this.canUpdateStatus) return;
      if (newStatus === 'done') {
        if (!confirm('确认标记为已完成？标记完成后将进入负责人验收环节。')) return;
      }
      t.status = newStatus;
      toast('任务状态已更新');
    },
    openDueDate(t) {
      if (!this.canUpdateStatus) return;
      this.dueDateTaskId = t.id;
      this.requestedDueDate = t.dueDate ? '2026-' + t.dueDate : '';
      this.dueDateReason = '';
      this.showDueDateModal = true;
    },
    submitDueDate() {
      toast('延期申请已提交，等待审批');
      store.notifications.unshift({ id: Date.now(), icon: '📅', iconBg: 'var(--warning-soft)', title: '延期申请', desc: '延期申请已提交', time: '刚刚', unread: true });
      this.showDueDateModal = false;
    },
    addLog() {
      if (!this.logContent.trim()) return;
      const taskObj = this.logTask ? this.allTasks.find(t => t.id === Number(this.logTask)) : null;
      store.workLogs.unshift({
        id: Date.now(), userId: currentUser().id, date: this.logDate,
        content: this.logContent, project: this.logProject || null, taskId: this.logTask || null,
        taskTitle: taskObj ? taskObj.title : null
      });
      this.logContent = '';
      this.logTask = '';
      toast('工作动态已记录');
    }
  }
}

          { title: '团队资源均衡', desc: '评估各成员工作负载，合理分配下季度项目资源' },
          { title: '建立延期预警机制', desc: '针对本季度延期模式，下季度设置任务到期前预警提醒' },
          { title: '季度复盘会议', desc: '组织团队季度闭环会议，对齐下季度 OKR 与行动路径' },
        ],
        year: [
          { title: '制定年度战略目标', desc: '与上级对齐新一年战略重点，拆解为季度里程碑' },
          { title: '团队能力提升计划', desc: '基于年度任务表现识别技能短板，制定针对性培训计划' },
          { title: '优化工作流程', desc: '将年度复盘发现的低效流程列入改进清单并推动落地' },
          { title: '识别高价值项目', desc: '筛选明年2-3个高影响力项目提前立项，早启动早收益' },
        ],
      };
      return map[this.period] || map.week;
    },
  },
  methods: {
    prevPeriod() {
      const weeks = ['W09','W10','W11','W12','W13','W14'];
      if (this.period === 'week') { const i = weeks.indexOf(this.selectedWeek); if (i > 0) this.selectedWeek = weeks[i-1]; }
      else if (this.period === 'month') { const m = parseInt(this.selectedMonth); this.selectedMonth = String(m > 1 ? m-1 : 12).padStart(2,'0'); }
      else if (this.period === 'quarter') { const qs=['Q1','Q2','Q3','Q4']; const i=qs.indexOf(this.selectedQuarter); this.selectedQuarter = qs[i>0?i-1:3]; }
      else { this.selectedYear = String(Number(this.selectedYear)-1); }
    },
    nextPeriod() {
      const weeks = ['W09','W10','W11','W12','W13','W14'];
      if (this.period === 'week') { const i = weeks.indexOf(this.selectedWeek); if (i < weeks.length-1) this.selectedWeek = weeks[i+1]; }
      else if (this.period === 'month') { const m = parseInt(this.selectedMonth); this.selectedMonth = String(m < 12 ? m+1 : 1).padStart(2,'0'); }
      else if (this.period === 'quarter') { const qs=['Q1','Q2','Q3','Q4']; const i=qs.indexOf(this.selectedQuarter); this.selectedQuarter = qs[i<3?i+1:0]; }
      else { this.selectedYear = String(Number(this.selectedYear)+1); }
    }
  }
}

        return val < 10 ? 'var(--success)' : val < 20 ? 'var(--warning)' : 'var(--danger)';

      return val >= 90 ? 'var(--success)' : val >= 80 ? 'var(--primary)' : 'var(--danger)';

      <div v-if="lowRateDepts.length" class="alert alert-warning" style="margin-bottom:14px;">

      </div>

      <!-- Department compliance ranking -->
      <div style="font-size:14px;font-weight:700;margin-bottom:10px;">📋 部门提交合规排名</div>
      <div v-for="(d, idx) in rankedDepts" :key="d.id" class="card" style="padding:10px 14px;margin-bottom:8px;">

              <div style="font-size:14px;font-weight:600;">{{ d.name }}</div>
              <div style="font-size:18px;font-weight:700;" :style="{ color: d.planRate >= 90 ? 'var(--success)' : d.planRate >= 80 ? 'var(--primary)' : 'var(--danger)' }">{{ d.planRate }}%</div>
            </div>
            <div style="font-size:12px;color:var(--text-3);margin-top:2px;">{{ d.leader }} · {{ d.members }}人</div>
            <div class="progress-bar" style="margin-top:6px;"><div class="progress-fill" :style="{ width: d.planRate + '%', background: d.planRate >= 90 ? 'var(--success)' : d.planRate >= 80 ? 'var(--primary)' : 'var(--danger)' }"></div></div>
          </div>
        </div>
      </div>
    </div>
  `,
  computed: {
    totalUsers() { return store.users.filter(u => u.role !== 'ADMIN').length || 12; },
    submittedCount() {
      return store.plans.filter(p => p.weekCode === store.selectedWeek && ['submitted','approved','reviewed'].includes(p.status)).length || 0;
    },
    coverageRate() { return this.totalUsers ? Math.round(this.submittedCount / this.totalUsers * 100) : 0; },
    l1Depts() { return store.departments.filter(d => !d.parentId); },
    rankedDepts() { return [...this.l1Depts].sort((a,b) => b.planRate - a.planRate); },
    lowRateDepts() { return this.l1Depts.filter(d => d.planRate < 80); },
  }
};

            <div>同步方式：<strong>定时全量 + 事件增量</strong></div>
            <div>全量频率：<strong>每日凌晨 6:00</strong></div>
            <div>增量触发：<strong>钉钉组织变更事件</strong></div>
            <div>上次同步：<strong>{{ lastSync }}</strong></div>
            <div>同步范围：<strong>部门树 · 成员信息 · 直属上级 · 在职状态</strong></div>
          </div>
          <button class="btn btn-primary btn-block" style="margin-top:12px;" @click="triggerSync" :disabled="syncing">
            {{ syncing ? '🔄 同步中...' : '🔄 立即触发全量同步' }}
          </button>
        </div>

        <div class="section-title">📋 同步记录</div>
        <div v-for="log in syncLogs" :key="log.time" class="card" style="padding:12px 14px;margin-bottom:8px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;">
            <div style="font-size:13px;font-weight:600;">{{ log.time }}</div>
            <span style="font-size:11px;padding:2px 8px;border-radius:10px;" :style="log.status === 'success' ? 'background:var(--success-soft);color:var(--success)' : 'background:var(--danger-soft);color:var(--danger)'">
              {{ log.status === 'success' ? '✅ 成功' : '❌ 失败' }}
            </span>
          </div>
          <div style="display:flex;gap:12px;font-size:12px;color:var(--text-3);">
            <span>➕ 新增 {{ log.added }}</span>

            <span>⛔ 停用 {{ log.deactivated }}</span>

        </div>
      </div>

    </div>
  `,
  computed: {
    filteredUsers() {
      let list = store.users;
      if (this.roleFilter !== 'all') list = list.filter(u => u.role === this.roleFilter);
      if (this.deptFilter !== 'all') list = list.filter(u => u.dept === this.deptFilter);
      if (this.search) {
        const q = this.search.toLowerCase();
        list = list.filter(u => u.name.toLowerCase().includes(q) || (u.dept && u.dept.toLowerCase().includes(q)));
      }
      return list;
    },
    deptTree() {
      return store.departments.filter(d => d.level === 1);
    },
    l1Depts() {
      return store.departments.filter(d => d.level === 1);
    },
    unassignedMembers() {
      return store.users.filter(u => !u.deptId && u.isActive !== false);
    }
  },
  methods: {
    l2Depts(parentId) { return store.departments.filter(d => d.level === 2 && d.parentId === parentId); },
    roleLabel(r) { return { EMPLOYEE:'员工', MANAGER:'负责人', HR:'HR', ADMIN:'管理员', BOSS:'CEO' }[r] || r; },
    roleColor(r) { return { EMPLOYEE:'var(--primary)', MANAGER:'var(--success)', HR:'var(--violet)', ADMIN:'var(--danger)', BOSS:'var(--warning)' }[r] || '#999'; },
    roleTagStyle(r) {
      const m = { EMPLOYEE:'background:var(--primary-soft);color:var(--primary)', MANAGER:'background:var(--success-soft);color:var(--success)', HR:'background:var(--violet-soft);color:var(--violet)', ADMIN:'background:var(--danger-soft);color:var(--danger)', BOSS:'background:var(--warning-soft);color:var(--warning)' };
      return m[r] || '';
    },
    getManager(u) { return u.managerId ? store.users.find(x => x.id === u.managerId) : null; },
    getSeniorManager(u) {
      const mgr = this.getManager(u);
      return mgr ? this.getManager(mgr) : null;
    },
    deptMemberCount(deptId) {
      const l2ids = store.departments.filter(d => d.parentId === deptId).map(d => d.id);
      return store.users.filter(u => u.deptId === deptId || l2ids.includes(u.deptId)).length;
    },
    deptMembers(deptId) {
      return store.users.filter(u => u.deptId === deptId && u.isActive !== false);
    },
    l2Members(l2DeptId) {
      return store.users.filter(u => u.deptId === l2DeptId && u.isActive !== false);
    },
    startEditUser(u) {
      this.editingUserId = u.id;
      this.editForm = { userId: u.id, role: u.role, managerId: u.managerId || null, reviewerSyncMode: u.reviewerSyncMode || 'auto', seniorReviewerSyncMode: u.seniorReviewerSyncMode || 'auto' };
    },
    saveUser(u) {
      u.role = this.editForm.role;
      u.managerId = this.editForm.managerId;
      u.reviewerSyncMode = this.editForm.reviewerSyncMode;
      u.seniorReviewerSyncMode = this.editForm.seniorReviewerSyncMode;
      this.editingUserId = null;
      toast('✅ ' + u.name + ' 配置已保存');
      store.auditLogs.unshift({ id: Date.now(), type: 'user', content: '管理员更新了 ' + u.name + ' 的角色和审核链配置', time: '03-12 ' + new Date().toTimeString().slice(0,5) });
    },
    toggleActive(u) {
      u.isActive = u.isActive === false ? true : false;
      toast(u.name + (u.isActive ? ' 已恢复' : ' 已停用'));
      store.auditLogs.unshift({ id: Date.now(), type: 'user', content: '管理员' + (u.isActive ? '恢复' : '停用') + '了账号：' + u.name, time: '03-12 ' + new Date().toTimeString().slice(0,5) });
    },
    triggerSync() {
      this.syncing = true;
      toast('🔄 正在同步钉钉组织架构...');
      setTimeout(() => {
        this.syncing = false;
        this.lastSync = '2026-03-12 ' + new Date().toTimeString().slice(0,5);
        this.syncLogs.unshift({ time: this.lastSync, status: 'success', added: 0, updated: 8, deactivated: 0, msg: '手动触发全量同步完成' });
        toast('✅ 同步完成，已更新 8 条人员记录');
        store.auditLogs.unshift({ id: Date.now(), type: 'sync', content: '管理员手动触发钉钉全量同步，更新 8 条人员记录', time: '03-12 ' + new Date().toTimeString().slice(0,5) });
      }, 2000);
    }
  }
};

      <div v-for="group in groupedProjects" :key="group.label" style="margin-bottom:16px;">

                <div><div style="font-size:11px;color:var(--text-3);margin-bottom:2px;">编码</div><input v-model="editForm.code" /></div>

  `,
  computed: {
    filteredProjects() {
      let list = store.projects;
      if (this.tab === 'pending') list = list.filter(p => p.status === 'pending');
      else if (this.tab === 'company') list = list.filter(p => p.level === 'company');
      else if (this.tab === 'department') list = list.filter(p => p.level === 'department');
      return list;
    },
    groupedProjects() {
      const groups = {};
      this.filteredProjects.forEach(p => {
        const label = p.level === 'company' ? '🏢 公司级项目' : ('🏗️ ' + (p.dept || '未归属部门'));
        if (!groups[label]) groups[label] = [];
        groups[label].push(p);
      });
      return Object.keys(groups).sort((a,b) => a.includes('公司级') ? -1 : 1).map(label => ({ label, items: groups[label] }));
    }
  },
  methods: {
    statusText(s) { return { pending: '待审批', approved: '已审批', rejected: '已驳回' }[s] || s; },
    statusBadge(s) { return { pending: 'badge-submitted', approved: 'badge-approved', rejected: 'badge-returned' }[s]; },
    levelStyle(l) { return l === 'company' ? { background: 'var(--violet-soft)', color: 'var(--violet)' } : { background: 'var(--cyan-soft)', color: 'var(--cyan)' }; },
    approveProject(p) { p.status = 'approved'; p.approvedBy = '刘管理'; toast('✅ 「' + p.name + '」已审批通过'); },
    rejectProject(p) { p.status = 'rejected'; toast('❌ 「' + p.name + '」已驳回'); },
    toggleProjectActive(p) { p.isActive = p.isActive === false ? true : false; toast(p.name + (p.isActive ? ' 已启用' : ' 已停用')); },
    startEditProject(p) {
      this.editingId = p.id;
      this.editForm = { name: p.name, code: p.code || '', level: p.level, deptId: store.departments.find(d => d.name === p.dept)?.id || null };
    },
    saveProject(p) {
      p.name = this.editForm.name;
      p.code = this.editForm.code;
      p.level = this.editForm.level;
      if (this.editForm.deptId) { const d = store.departments.find(x => x.id === this.editForm.deptId); if (d) p.dept = d.name; }
      this.editingId = null;
      toast('✅ 项目已更新');
    },
    createProject() {
      const f = this.addForm;
      const dept = store.departments.find(d => d.id === f.deptId);
      store.projects.push({ id: Date.now(), name: f.name, code: f.code, level: f.level, status: 'approved', dept: dept ? dept.name : '', creator: '刘管理', isActive: true, isArchived: false });
      this.addForm = { name: '', code: '', level: 'department', deptId: null };
      this.showAdd = false;
      toast('✅ 项目已创建');
    },
    doArchive() {
      if (this.archiveTarget) { this.archiveTarget.isArchived = true; toast('📦 「' + this.archiveTarget.name + '」已归档'); }
      this.showArchiveModal = false; this.archiveTarget = null;
    }
  }
};

  computed: {
    showBack() {
      return this.$route.path !== '/dashboard' && this.$route.path !== '/' &&
             this.$route.path !== '/boss/dashboard' && this.$route.path !== '/hr/dashboard' && !this.$route.path.startsWith('/admin/');
    },
    pageTitle() {
      const map = {
        '/dashboard': 'WeekSync',
        '/plans': '我的计划',
        '/team': '团队计划',
        '/execution': '今日执行',
        '/review': '周复盘',
        '/notifications': '通知中心',
        '/boss/dashboard': '分析看板',
        '/boss/plans': '全员计划',
        '/boss/reports': '组织报告',
        '/hr/dashboard': '合规概览',
        '/hr/analytics': '人员分析',
        '/admin/personnel': '人员管理',
        '/admin/projects': '项目台账',
      };
      if (this.$route.path.startsWith('/plans/')) return '计划详情';
      return map[this.$route.path] || 'WeekSync';
    },
    pageSubtitle() {
      if (this.$route.path === '/dashboard' || this.$route.path === '/boss/dashboard' || this.$route.path === '/hr/dashboard') {
        const r = roles.find(r2 => r2.id === store.currentRole);
        return r ? `${r.user} · ${r.name}` : '';
      }
      return '';
    }
  }
};

const app = createApp(App);

// Global mixin to expose store and helpers to all component templates
app.mixin({
  computed: {
    store() { return store; },
    roles() { return roles; },
  },
  methods: {
    toast: toast,
    currentUser: currentUser,
    statusLabel: statusLabel,
    priorityLabel: priorityLabel,
    taskStatusLabel: taskStatusLabel,
    sourceLabel: sourceLabel,
  }
});

app.component('app-header', AppHeader);
app.component('tab-bar', TabBar);
app.component('role-drawer', RoleDrawer);
app.component('toast-msg', ToastMsg);
app.component('week-selector', WeekSelector);
app.component('workspace-mode-bar', WorkspaceModeBar);
app.use(router);

// Guard: redirect to role select if no role chosen
router.beforeEach((to, from) => {
  if (!store.currentRole && to.path !== '/') return '/';
});

app.mount('#app');
  </script>
</body>
</html>
