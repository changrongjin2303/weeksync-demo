          // Set task back to progress for incomplete evaluation
          transitionTask(this.evalTask, 'progress', currentUser().id);
          createTodo(this.plan.userId, 'continue_task', 'task', this.evalTask.taskId || this.evalTask.id, '继续完善「' + this.evalTask.title + '」', '主管评估为未完成，请继续推进', '/tasks');
        }
        const resultLabel = { completed:'已完成', incomplete:'未完成', authorized_delay:'获权延期' }[this.evalResult] || this.evalResult;
        const delayInfo = this.evalResult === 'authorized_delay' && this.evalNewDueDate ? '，延期至 ' + this.evalNewDueDate : '';
        toast('✅ 已评估：' + this.evalTask.title);
        createNotification('eval_done', 'task', this.evalTask.taskId, '任务评估完成', '「' + this.evalTask.title + '」评估结果：' + resultLabel + delayInfo, '⭐', 'var(--violet-soft)', [this.plan.userId], '/plans/' + this.plan.id);
        createAuditLog('task:evaluate', 'task', this.evalTask.taskId || this.evalTask.id, currentUser().name + ' 评估了「' + this.evalTask.title + '」：' + resultLabel, null, { result: this.evalResult, score: this.evalScore });
      }
      this.showEvalModal = false;
    },
    rejectCompletion(t) {
      transitionTask(t, 'progress', currentUser().id);
      toast('↩️ 已驳回完成，任务退回进行中');
      createAuditLog('task:reject_completion', 'task', t.taskId || t.id, currentUser().name + ' 驳回了「' + t.title + '」的完成状态，退回执行中', { status: 'done' }, { status: 'progress' });
      createNotification('task_rejected', 'task', t.taskId || t.id, '任务完成被驳回', '「' + t.title + '」已被退回执行中，请继续完善', '↩️', '#fef2f2', [this.plan.userId], '/tasks');
      createTodo(this.plan.userId, 'continue_task', 'task', t.taskId || t.id, '继续执行「' + t.title + '」', '主管驳回了完成状态，请继续完善', '/tasks');
    },
    submitPlan() {
      transitionPlan(this.plan, 'submitted');
      this.plan.submittedAt = '03-12 ' + new Date().toTimeString().slice(0,5);
      toast('✅ 计划已提交，等待主管审批');
      createAuditLog('plan:submit', 'plan', this.plan.id, this.plan.userName + ' 提交了 ' + this.plan.weekCode + ' 周计划', null, { status: 'submitted' });
      // Mark revise_plan todo as done (if this is a resubmission after return)
      const reviseTodo = store.user_todos.find(t => t.type === 'revise_plan' && t.targetId === this.plan.id && !t.done);
      if (reviseTodo) reviseTodo.done = true;
      const managerId = store.users.find(u => u.id === this.plan.userId)?.managerId;
      if (managerId) {
        createNotification('plan_submitted', 'plan', this.plan.id, this.plan.userName + '提交了周计划', this.plan.weekCode + '周计划等待审批，共' + this.plan.tasks.length + '个任务，请及时处理', '📋', 'var(--primary-soft)', [managerId], '/plans/' + this.plan.id);
        createTodo(managerId, 'approve_plan', 'plan', this.plan.id, '审批 ' + this.plan.userName + ' 的周计划', this.plan.weekCode + '，共' + this.plan.tasks.length + '个任务', '/plans/' + this.plan.id);
      }
    },
    approvePlan() {
      const comment = this.approveComment.trim() || currentUser().name + ' 审批通过，请按计划执行。';
      this.plan.approvalComment = comment;
      transitionPlan(this.plan, 'approved');
      this.plan.approvedById = currentUser().id;
      this.showApproveModal = false;
      toast('✅ 计划已审批通过');
      createAuditLog('plan:approve', 'plan', this.plan.id, currentUser().name + ' 审批通过了 ' + this.plan.userName + ' 的周计划：' + comment, { status: 'submitted' }, { status: 'approved' });
      createNotification('plan_approved', 'plan', this.plan.id, '周计划审批通过', currentUser().name + '已审批通过您的' + this.plan.weekCode + '周计划：' + comment, '✅', 'var(--success-soft)', [this.plan.userId], '/plans/' + this.plan.id);
      // Mark the manager's approval todo as done
      const approvalTodo = store.user_todos.find(t => t.type === 'approve_plan' && t.targetId === this.plan.id && !t.done);
      if (approvalTodo) approvalTodo.done = true;
      // Create a todo for the employee to start execution
      createTodo(this.plan.userId, 'start_execution', 'plan', this.plan.id, '开始执行本周计划', this.plan.weekCode + '计划已审批通过，进入执行阶段', '/tasks');
      this.approveComment = '';
    },
    returnPlan() {
      transitionPlan(this.plan, 'returned');
      this.plan.returnComment = this.comment;
      this.showReturnModal = false;
      toast('↩️ 计划已退回，已通知员工修改');
      createAuditLog('plan:return', 'plan', this.plan.id, currentUser().name + ' 退回了 ' + this.plan.userName + ' 的周计划，原因：' + this.comment, { status: 'submitted' }, { status: 'returned' });
      createNotification('plan_returned', 'plan', this.plan.id, '周计划已被退回修改', currentUser().name + '退回了您的' + this.plan.weekCode + '周计划：' + this.comment, '↩️', '#fef2f2', [this.plan.userId], '/plans/' + this.plan.id);
      // Mark the manager's approval todo as done
      const approvalTodo = store.user_todos.find(t => t.type === 'approve_plan' && t.targetId === this.plan.id && !t.done);
      if (approvalTodo) approvalTodo.done = true;
      createTodo(this.plan.userId, 'revise_plan', 'plan', this.plan.id, '修改并重新提交周计划', '主管退回了' + this.plan.weekCode + '周计划：' + this.comment, '/plans/' + this.plan.id);
    },
    completePlanReview() {
      transitionPlan(this.plan, 'reviewed');
      toast('📊 复盘评价已完成');
      createAuditLog('plan:review', 'plan', this.plan.id, currentUser().name + ' 完成了 ' + this.plan.userName + ' ' + this.plan.weekCode + ' 的复盘评价', { status: 'approved' }, { status: 'reviewed' });
    },
    acceptCollab(t) {
      this.collabTask = t;
      this.collabHandlerId = '';
      this.collabNewTitle = '【协办】' + t.title;
      this.collabNewDeliverable = t.collabDeliverable || '';
      this.collabNewDue = t.collabDeadline || '2026-03-15';
      this.collabNewPriority = t.priority || 'medium';
      this.collabNewProject = t.project || '';
      this.collabNewDesc = t.collabNote || t.description || '';
      this.showAssignHandlerModal = true;
    },
    assignCollabHandler() {
      const t = this.collabTask;
      if (t) {
        const handlerUserId = Number(this.collabHandlerId);
        const handlerUser = store.users.find(u => u.id === handlerUserId);
        const handlerName = handlerUser ? handlerUser.name : '经办人';
        t.collabStatus = 'accepted';
        t.collabHandler = handlerName;
        t.collabHandlerId = handlerUserId;
        // Create or find handler's plan
        const weekCode = getWeekCode(store.weekOffset);
        let handlerPlan = store.plans.find(p => p.userId === handlerUserId && p.weekCode === weekCode);
        if (!handlerPlan) {
          handlerPlan = { id: Date.now() + 100, userId: handlerUserId, weekCode: weekCode, status: 'approved', submittedAt: new Date().toISOString(), approvedById: currentUser().id, taskIds: [] };
          patchPlanDisplayFields2(handlerPlan);
          store.plans.push(handlerPlan);
          patchPlanTasks();
        }
        // Create NEW task from form data
        const ts = Date.now();
        const collabTask = {
          id: ts, taskId: ts, planId: handlerPlan.id, assigneeId: handlerUserId,
          projectId: null,
          title: this.collabNewTitle,
          project: this.collabNewProject || null,
          priority: this.collabNewPriority,
          status: 'todo',
          source: 'collab',
          dueDate: (this.collabNewDue || '').replace('2026-', ''),
          difficulty: 5,
          deliverable: this.collabNewDeliverable,
          description: this.collabNewDesc,
          reviewResult: null, score: null,
          delayHistory: [],
          collabStatus: 'accepted',
          collabInitiatorId: t.collabInitiatorId || this.plan.userId,
          collabOrigTaskId: t.taskId || t.id,
          collabDeliverable: this.collabNewDeliverable,
          collabDeadline: this.collabNewDue,
          createdAt: new Date().toISOString(),
          updatedAt: null
        };
        store.tasks.push(collabTask);
        handlerPlan.taskIds.push(collabTask.taskId);
        // Notify the collab initiator
        const initiatorId = t.collabInitiatorId || this.plan.userId;
        createNotification('collab_accepted', 'task', t.taskId || t.id, '协办已接收，经办人已指派', currentUser().name + '已接收协办：「' + t.title + '」，经办人：' + handlerName + '（' + (handlerUser?.dept || '') + '），将尽快推进', '✈', '#eff6ff', [initiatorId, this.plan.userId], this.$route.fullPath);
        // Notify the handler if not self
        if (handlerUserId !== currentUser().id) {
          createNotification('collab_assigned', 'task', collabTask.taskId, '你被指派为协办经办人', currentUser().name + '指派你负责协办任务：「' + this.collabNewTitle + '」，请查看任务详情', '✈', '#f0f9ff', [handlerUserId], '/tasks');
          createTodo(handlerUserId, 'collab_handler', 'task', collabTask.taskId, '协办任务「' + this.collabNewTitle + '」', '由' + currentUser().name + '指派，请尽快处理', '/tasks');
        }
        toast('✅ 已接收协办并创建经办任务，指派：' + handlerName);
        // Mark accept_collab todo
        const todo = store.user_todos.find(td => td.type === 'accept_collab' && td.targetId === (t.taskId || t.id) && !td.done);
        if (todo) todo.done = true;
      }
      this.showAssignHandlerModal = false;
    },
    rejectCollab(t) {
      t.collabStatus = 'rejected';
      const initiatorId = t.collabInitiatorId || this.plan.userId;
      createNotification('collab_rejected', 'task', t.taskId || t.id, '协办申请被拒绝', currentUser().name + '拒绝了协办申请「' + t.title + '」，请考虑其他方案', '❌', '#fef2f2', [initiatorId], '/tasks');
      const todo = store.user_todos.find(td => td.type === 'accept_collab' && td.targetId === (t.taskId || t.id) && !td.done);
      if (todo) todo.done = true;
      toast('❌ 已拒绝协办申请');
    },
    openCollabReceipt(t) {
      this.collabTask = t;
      this.showCollabReceiptModal = true;
    },
    submitCollabReceipt() {
      const t = this.collabTask || this.acceptedCollabTask;
      if (t) {
        t.collabStatus = 'receipt_submitted';
        t.collabReceipt = this.collabReceiptNote;
        const handlerInfo = t.collabHandler ? '（经办人：' + t.collabHandler + '）' : '';
        createNotification('collab_receipt', 'task', t.taskId, '协作反馈已提交', currentUser().name + '已完成协办工作' + handlerInfo + '，请查看回执', '✅', 'var(--success-soft)', [this.plan.userId, 3], this.$route.fullPath);
        toast('✅ 协作反馈已提交');
      }
      this.showCollabReceiptModal = false;
    }
  }
};

  computed: {
    currentPlan() {
      const uid = currentUser().id;
      return store.plans.find(p => p.userId === uid && p.weekCode === '2026-W11');
    },
    canUpdateStatus() { return this.currentPlan && this.currentPlan.status === 'approved'; },
    allTasks() { return this.currentPlan ? this.currentPlan.tasks : []; },
    totalCount() { return this.allTasks.length; },
    todoCount() { return this.allTasks.filter(t => t.status === 'todo').length; },
    progressCount() { return this.allTasks.filter(t => t.status === 'progress').length; },
    doneCount() { return this.allTasks.filter(t => t.status === 'done').length; },
    allTasksDone() { return this.totalCount > 0 && this.doneCount === this.totalCount; },
    allTasksEvaluated() {
      if (!this.allTasksDone) return false;
      const myPlans = store.plans.filter(p => p.userId === currentUser().id && p.status === 'approved');
      if (!myPlans.length) return false;
      const doneTasks = myPlans.flatMap(p => p.tasks).filter(t => t.status === 'done');
      return doneTasks.length > 0 && doneTasks.every(t => t.reviewResult);
    },
    pendingEvalCount() {
      const plans = store.plans.filter(p => p.status === 'approved' && p.userId !== currentUser().id);
      let count = 0;
      plans.forEach(p => { count += p.tasks.filter(t => t.status === 'done' && !t.reviewResult).length; });
      return count;
    },
    pendingEvalTask() {
      const plans = store.plans.filter(p => p.status === 'approved' && p.userId !== currentUser().id);
      for (const p of plans) {
        const t = p.tasks.find(t => t.status === 'done' && !t.reviewResult);
        if (t) return t.title;
      }
      return '';
    },
    reassignCandidates() {
      const uid = currentUser().id;
      return store.users.filter(u => u.id !== uid && u.isActive && (u.role === 'EMPLOYEE' || u.role === 'MANAGER'));
    },
    filteredTasks() {
      let tasks = this.allTasks;
      if (this.statusFilter !== 'all') tasks = tasks.filter(t => t.status === this.statusFilter);
      // 默认排序：临期高优 > 执行中 > 待开始 > 已完成
      const statusRank = { progress: 0, todo: 1, done: 2 };
      const pRank = { high: 0, medium: 1, low: 2 };
      return [...tasks].sort((a, b) => {
        // 先按状态分组
        const sa = statusRank[a.status] ?? 1, sb = statusRank[b.status] ?? 1;
        if (sa !== sb) return sa - sb;
        // 同状态内按优先级排
        const pa = pRank[a.priority] ?? 1, pb = pRank[b.priority] ?? 1;
        if (pa !== pb) return pa - pb;
        // 同优先级按截止日期排（临期优先）
        return (a.dueDate || '').localeCompare(b.dueDate || '');
      });
    },
    filterOptions() {
      return [
        { value: 'all', label: '全部' }, { value: 'todo', label: '待开始' },
        { value: 'progress', label: '执行中' }, { value: 'done', label: '已完成' },
      ];
    },
    statusOptions() {
      return [
        { value: 'todo', label: '待开始', activeBg: '#f1f5f9', activeColor: 'var(--text-2)', borderColor: 'var(--border)' },
        { value: 'progress', label: '执行中', activeBg: 'var(--primary-soft)', activeColor: 'var(--primary)', borderColor: '#93c5fd' },
        { value: 'done', label: '已完成', activeBg: 'var(--success-soft)', activeColor: 'var(--success)', borderColor: '#86efac' },
      ];
    },
    todayLogs() { return store.workLogs.filter(l => l.userId === currentUser().id).slice(0, 5); }
  },
  methods: {
    taskStatusLabel, priorityLabel,
    priorityStars(p) { return p === 'high' ? 5 : p === 'medium' ? 3 : 1; },
    canAdvanceTo(currentStatus, targetStatus) {
      const order = ['todo', 'progress', 'done'];
      return order.indexOf(targetStatus) === order.indexOf(currentStatus) + 1;
    },
    changeStatus(t, newStatus) {
      if (!this.canUpdateStatus) return;
      if (newStatus === 'done') {
        if (!confirm('确认标记为已完成？标记完成后将进入负责人验收环节。')) return;
      }
      transitionTask(t, newStatus, currentUser().id);
      toast('任务状态已更新');
    },
    openDueDate(t) {
      if (!this.canUpdateStatus) return;
      this.dueDateTaskId = t.id;
      this.requestedDueDate = t.dueDate ? '2026-' + t.dueDate : '';
      this.dueDateReason = '';
      this.showDueDateModal = true;
    },
    submitDueDate() {
      toast('延期申请已提交，等待审批');
      const mgr2 = store.users.find(u => u.id === currentUser().id)?.managerId;
      if (mgr2) createNotification('delay_request', 'task', null, '延期申请', '延期申请已提交', '📅', 'var(--warning-soft)', [mgr2, currentUser().id], '/tasks');
      this.showDueDateModal = false;
    },
    openReassign(t) {
      this.reassignTaskId = t.taskId || t.id;
      this.reassignToUserId = null;
      this.reassignReason = '';
      this.showReassignModal = true;
    },
    submitReassign() {
      if (!this.reassignToUserId || !this.reassignTaskId) return;
      reassignTask(this.reassignTaskId, currentUser().id, this.reassignToUserId, this.reassignReason);
      this.showReassignModal = false;
      toast('🔄 转派申请已发出，等待对方确认');
    },
    addLog() {
      if (!this.logContent.trim()) return;
      const taskObj = this.logTask ? this.allTasks.find(t => t.id === Number(this.logTask)) : null;
      store.workLogs.unshift({
        id: Date.now(), userId: currentUser().id, date: this.logDate,
        content: this.logContent, project: this.logProject || null, taskId: this.logTask || null,
        taskTitle: taskObj ? taskObj.title : null
      });
      this.logContent = '';
      this.logTask = '';
      toast('工作动态已记录');
    }
  }
}

      <!-- 通知列表 -->
      <div v-if="tab === 'notifications'">
        <div v-if="!myNotifications.length" style="text-align:center;color:var(--text-3);font-size:13px;padding:40px 0;">暂无通知</div>
        <div v-for="n in myNotifications" :key="n.id" class="notif-item" :class="{ unread: !n.read }" @click="handleNotif(n)" style="cursor:pointer;">
          <div class="notif-icon" :style="{ background: n.event?.iconBg || '#f0f0f0' }">{{ n.event?.icon || '🔔' }}</div>
          <div class="notif-body">
            <div class="notif-title">{{ n.event?.title || '通知' }}</div>
            <div class="notif-desc">{{ n.event?.desc || '' }}</div>
            <div class="notif-time">{{ formatTime(n.event?.createdAt) }}</div>
          </div>
          <div v-if="n.link" style="color:var(--primary);font-size:18px;align-self:center;padding-left:4px;flex-shrink:0;">›</div>
        </div>
      </div>

      <!-- 待办列表 -->
      <div v-if="tab === 'todos'">
        <div v-if="!myTodos.length" style="text-align:center;color:var(--text-3);font-size:13px;padding:40px 0;">暂无待办</div>
        <div v-for="t in myTodos" :key="t.id" class="notif-item" :class="{ unread: !t.done }" @click="handleTodo(t)" style="cursor:pointer;">
          <div class="notif-icon" :style="{ background: t.done ? 'var(--success-soft)' : 'var(--primary-soft)' }">{{ t.done ? '✅' : '📌' }}</div>
          <div class="notif-body">
            <div class="notif-title" :style="t.done ? 'text-decoration:line-through;color:var(--text-3)' : ''">{{ t.title }}</div>
            <div class="notif-desc">{{ t.desc }}</div>
            <div class="notif-time">{{ formatTime(t.createdAt) }}</div>
          </div>
          <div v-if="t.link && !t.done" style="color:var(--primary);font-size:18px;align-self:center;padding-left:4px;flex-shrink:0;">›</div>
        </div>
      </div>
    </div>
  `,
  computed: {
    userId() {
      const roleMap = { EMPLOYEE: 1, EMPLOYEE2: 2, MANAGER: 3, HR: 4, BOSS: 5, ADMIN: 6, EMPLOYEE3: 11 };
      return roleMap[store.currentRole] || 1;
    },
    myNotifications() {
      return store.user_notifications
        .filter(un => un.userId === this.userId)
        .map(un => ({ ...un, event: store.notification_events.find(e => e.id === un.eventId) }))
        .sort((a, b) => (b.event?.createdAt || '').localeCompare(a.event?.createdAt || ''));
    },
    myTodos() {
      return store.user_todos.filter(t => t.userId === this.userId).sort((a, b) => (a.done === b.done ? 0 : a.done ? 1 : -1));
    },
    pendingTodos() { return this.myTodos.filter(t => !t.done); },
    unreadCount() { return this.myNotifications.filter(n => !n.read).length; }
  },
  methods: {
    formatTime(ts) {
      if (!ts) return '';
      const h = Math.floor((Date.now() - new Date(ts).getTime()) / 3600000);
      if (h < 1) return '刚刚';
      if (h < 24) return h + '小时前';
      return Math.floor(h / 24) + '天前';
    },
    handleNotif(n) {
      const un = store.user_notifications.find(x => x.id === n.id);
      if (un) un.read = true;
      if (n.link) this.$router.push(n.link);
      else toast('已读');
    },
    handleTodo(t) {
      if (t.done) return;
      if (t.link) this.$router.push(t.link);
      else { t.done = true; toast('已完成'); }
    },
    markAllRead() {
      this.myNotifications.forEach(n => {
        const un = store.user_notifications.find(x => x.id === n.id);
        if (un) un.read = true;
      });
      toast('✅ 已全部标记为已读');
    }
  }
};

      if (this.search) {
        const q = this.search.toLowerCase();
        list = list.filter(u => u.name.toLowerCase().includes(q) || (u.dept && u.dept.toLowerCase().includes(q)));
      }
      return list;

    l1Depts() {

  methods: {
    l2Depts(parentId) { return store.departments.filter(d => d.level === 2 && d.parentId === parentId); },
    roleLabel(r) { return { EMPLOYEE:'员工', MANAGER:'负责人', HR:'HR', ADMIN:'管理员', BOSS:'CEO' }[r] || r; },
    roleColor(r) { return { EMPLOYEE:'var(--primary)', MANAGER:'var(--success)', HR:'var(--violet)', ADMIN:'var(--danger)', BOSS:'var(--warning)' }[r] || '#999'; },
    roleTagStyle(r) {
      const m = { EMPLOYEE:'background:var(--primary-soft);color:var(--primary)', MANAGER:'background:var(--success-soft);color:var(--success)', HR:'background:var(--violet-soft);color:var(--violet)', ADMIN:'background:var(--danger-soft);color:var(--danger)', BOSS:'background:var(--warning-soft);color:var(--warning)' };
      return m[r] || '';
    },
    getManager(u) { return u.managerId ? store.users.find(x => x.id === u.managerId) : null; },
    getSeniorManager(u) {
      const mgr = this.getManager(u);
      return mgr ? this.getManager(mgr) : null;
    },
    deptMemberCount(deptId) {
      const l2ids = store.departments.filter(d => d.parentId === deptId).map(d => d.id);
      return store.users.filter(u => u.deptId === deptId || l2ids.includes(u.deptId)).length;
    },
    deptMembers(deptId) {
      return store.users.filter(u => u.deptId === deptId && u.isActive !== false);
    },
    l2Members(l2DeptId) {
      return store.users.filter(u => u.deptId === l2DeptId && u.isActive !== false);
    },
    startEditUser(u) {
      this.editingUserId = u.id;
      this.editForm = { userId: u.id, role: u.role, managerId: u.managerId || null, reviewerSyncMode: u.reviewerSyncMode || 'auto', seniorReviewerSyncMode: u.seniorReviewerSyncMode || 'auto' };
    },
    saveUser(u) {
      u.role = this.editForm.role;
      u.managerId = this.editForm.managerId;
      u.reviewerSyncMode = this.editForm.reviewerSyncMode;
      u.seniorReviewerSyncMode = this.editForm.seniorReviewerSyncMode;
      this.editingUserId = null;
      toast('✅ ' + u.name + ' 配置已保存');
      createAuditLog('user:update', 'user', u.id, '管理员更新了 ' + u.name + ' 的角色和审批链配置', null, { role: u.role, managerId: u.managerId });
    },
    toggleActive(u) {
      u.isActive = u.isActive === false ? true : false;
      toast(u.name + (u.isActive ? ' 已恢复' : ' 已停用'));
      createAuditLog('user:toggle_active', 'user', u.id, '管理员' + (u.isActive ? '恢复' : '停用') + '了账号：' + u.name, null, { isActive: u.isActive });
    },
    triggerSync() {
      this.syncing = true;
      toast('🔄 正在同步钉钉组织架构...');
      setTimeout(() => {
        this.syncing = false;
        this.lastSync = '2026-03-12 ' + new Date().toTimeString().slice(0,5);
        this.syncLogs.unshift({ time: this.lastSync, status: 'success', added: 0, updated: 8, deactivated: 0, msg: '手动触发全量同步完成' });
        toast('✅ 同步完成，已更新 8 条人员记录');
        createAuditLog('sync:full', 'system', null, '管理员手动触发钉钉全量同步，更新 8 条人员记录', null, { added: 0, updated: 8 });
      }, 2000);
    }
  }
};

// 4. Projects Ledger
const AdminProjects = {

  template: `

          <div><div style="font-size:11px;color:var(--text-3);margin-bottom:2px;">项目名称 *</div><input v-model="addForm.name" placeholder="输入项目名称" /></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            <div><div style="font-size:11px;color:var(--text-3);margin-bottom:2px;">项目编码</div><input v-model="addForm.code" placeholder="可选" /></div>
            <div><div style="font-size:11px;color:var(--text-3);margin-bottom:2px;">项目级别</div><select v-model="addForm.level" style="font-size:12px;"><option value="department">部门级</option><option value="company">公司级</option></select></div>
          </div>
          <div><div style="font-size:11px;color:var(--text-3);margin-bottom:2px;">归属部门 *</div><select v-model="addForm.deptId" style="font-size:12px;"><option :value="null">请选择</option><option v-for="d in store.departments" :key="d.id" :value="d.id">{{ d.name }}</option></select></div>
          <button class="btn btn-primary btn-block btn-sm" :disabled="!addForm.name || !addForm.deptId" @click="createProject">创建项目</button>
        </div>
      </div>

      <!-- Project Groups -->
      <div v-for="group in groupedProjects" :key="group.label" style="margin-bottom:16px;">
        <div style="font-size:13px;font-weight:600;color:var(--text-3);margin-bottom:8px;padding-left:4px;">{{ group.label }}</div>
        <div v-for="p in group.items" :key="p.id" class="card" style="padding:12px 14px;">
          <!-- View Mode -->
          <div v-if="editingId !== p.id">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
              <div style="flex:1;">
                <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
                  <span style="font-size:14px;font-weight:600;">{{ p.name }}</span>
                  <span style="font-size:10px;padding:1px 6px;border-radius:4px;" :style="levelStyle(p.level)">{{ p.level === 'company' ? '公司级' : '部门级' }}</span>
                  <span v-if="p.isArchived" style="font-size:10px;padding:1px 6px;border-radius:4px;background:#f1f5f9;color:#64748b;">已归档</span>
                  <span v-if="p.isActive === false" style="font-size:10px;padding:1px 6px;border-radius:4px;background:var(--danger-soft);color:var(--danger);">已停用</span>
                </div>
                <div style="font-size:11px;color:var(--text-3);margin-top:3px;">
                  {{ p.code ? p.code + ' · ' : '' }}{{ p.dept }} · 创建人: {{ p.creator || '系统' }}
                </div>
              </div>
              <span class="badge" :class="statusBadge(p.status)">{{ statusText(p.status) }}</span>
            </div>

            <!-- Actions -->
            <div style="display:flex;flex-wrap:wrap;gap:6px;">
              <button v-if="p.status === 'pending'" class="btn btn-success btn-sm" style="font-size:11px;padding:4px 10px;" @click="approveProject(p)">✅ 审批通过</button>
              <button v-if="p.status === 'pending'" class="btn btn-danger btn-sm" style="font-size:11px;padding:4px 10px;" @click="rejectProject(p)">❌ 驳回</button>
              <button class="btn btn-outline btn-sm" style="font-size:11px;padding:4px 10px;" @click="startEditProject(p)">✏️ 编辑</button>
              <button class="btn btn-sm" :class="p.isActive !== false ? 'btn-outline' : 'btn-success'" style="font-size:11px;padding:4px 10px;" @click="toggleProjectActive(p)">{{ p.isActive !== false ? '停用' : '启用' }}</button>
              <button v-if="!p.isArchived" class="btn btn-outline btn-sm" style="font-size:11px;padding:4px 10px;color:var(--text-3);" @click="archiveTarget = p; showArchiveModal = true">📦 归档</button>
            </div>
          </div>

          <!-- Edit Mode -->
          <div v-else>
            <div style="font-size:13px;font-weight:600;color:var(--primary);margin-bottom:10px;">编辑项目</div>
            <div style="display:flex;flex-direction:column;gap:8px;">
              <div style="display:grid;grid-template-columns:2fr 1fr;gap:8px;">
                <div><div style="font-size:11px;color:var(--text-3);margin-bottom:2px;">项目名称 *</div><input v-model="editForm.name" /></div>
                <div><div style="font-size:11px;color:var(--text-3);margin-bottom:2px;">编码</div><input v-model="editForm.code" /></div>
              </div>
              <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
                <div><div style="font-size:11px;color:var(--text-3);margin-bottom:2px;">级别</div><select v-model="editForm.level" style="font-size:12px;"><option value="department">部门级</option><option value="company">公司级</option></select></div>
                <div><div style="font-size:11px;color:var(--text-3);margin-bottom:2px;">归属部门</div><select v-model="editForm.deptId" style="font-size:12px;"><option v-for="d in store.departments" :key="d.id" :value="d.id">{{ d.name }}</option></select></div>
              </div>
            </div>
            <div style="display:flex;gap:8px;margin-top:10px;">
              <button class="btn btn-primary btn-sm" style="flex:1;" :disabled="!editForm.name" @click="saveProject(p)">保存</button>

      <div v-if="!filteredProjects.length" class="empty-state">

          </div>

            项目「<strong>{{ archiveTarget?.name }}</strong>」归档后将不再出现在任务选择列表中。
          </div>
          <button class="btn btn-danger btn-block" @click="doArchive">确认归档</button>
        </div>
      </div>
    </div>
  `,
  computed: {
    filteredProjects() {
      let list = store.projects;
      if (this.tab === 'pending') list = list.filter(p => p.status === 'pending');
      else if (this.tab === 'company') list = list.filter(p => p.level === 'company');
      else if (this.tab === 'department') list = list.filter(p => p.level === 'department');
      return list;
    },
    groupedProjects() {
      const groups = {};
      this.filteredProjects.forEach(p => {
        const label = p.level === 'company' ? '🏢 公司级项目' : ('🏗️ ' + (p.dept || '未归属部门'));
        if (!groups[label]) groups[label] = [];
        groups[label].push(p);
      });
      return Object.keys(groups).sort((a,b) => a.includes('公司级') ? -1 : 1).map(label => ({ label, items: groups[label] }));
    }
  },
  methods: {
    statusText(s) { return { pending: '待审批', approved: '已审批', rejected: '已驳回' }[s] || s; },
    statusBadge(s) { return { pending: 'badge-submitted', approved: 'badge-approved', rejected: 'badge-returned' }[s]; },
    levelStyle(l) { return l === 'company' ? { background: 'var(--violet-soft)', color: 'var(--violet)' } : { background: 'var(--cyan-soft)', color: 'var(--cyan)' }; },
    approveProject(p) { p.status = 'approved'; p.approvedBy = '刘管理'; toast('✅ 「' + p.name + '」已审批通过'); },
    rejectProject(p) { p.status = 'rejected'; toast('❌ 「' + p.name + '」已驳回'); },
    toggleProjectActive(p) { p.isActive = p.isActive === false ? true : false; toast(p.name + (p.isActive ? ' 已启用' : ' 已停用')); },
    startEditProject(p) {
      this.editingId = p.id;
      this.editForm = { name: p.name, code: p.code || '', level: p.level, deptId: store.departments.find(d => d.name === p.dept)?.id || null };
    },
    saveProject(p) {
      p.name = this.editForm.name;
      p.code = this.editForm.code;
      p.level = this.editForm.level;
      if (this.editForm.deptId) { const d = store.departments.find(x => x.id === this.editForm.deptId); if (d) p.dept = d.name; }
      this.editingId = null;
      toast('✅ 项目已更新');
    },
    createProject() {
      const f = this.addForm;
      const dept = store.departments.find(d => d.id === f.deptId);
      store.projects.push({ id: Date.now(), name: f.name, code: f.code, level: f.level, status: 'approved', dept: dept ? dept.name : '', creator: '刘管理', isActive: true, isArchived: false });
      this.addForm = { name: '', code: '', level: 'department', deptId: null };
      this.showAdd = false;
      toast('✅ 项目已创建');
    },
    doArchive() {
      if (this.archiveTarget) { this.archiveTarget.isArchived = true; toast('📦 「' + this.archiveTarget.name + '」已归档'); }
      this.showArchiveModal = false; this.archiveTarget = null;
    }
  }
};

  { path: '/', component: RoleSelectPage },
  { path: '/dashboard', component: DashboardPage },
  { path: '/tasks', component: TaskPage },
  { path: '/plans', redirect: '/tasks' },
  { path: '/plans/:id', component: PlanDetailPage },
  { path: '/team', component: TeamPlansPage },
  { path: '/tasks', redirect: '/tasks' },
  { path: '/review', component: ReviewPage },
  { path: '/review/team', component: TeamReviewPage },
  { path: '/notifications', component: NotificationsPage },
  { path: '/boss/dashboard', component: BossDashboard },
  { path: '/boss/plans', component: BossPlans },
  { path: '/boss/reports', component: BossReports },
  { path: '/hr/dashboard', component: HrDashboard },
  { path: '/hr/analytics', component: HrAnalytics },

// ===================== APP =====================
const App = {
  template: `
    <div v-if="store.currentRole" class="app-shell">
      <app-header :title="pageTitle" :subtitle="pageSubtitle" :show-back="showBack" />
      <router-view />
      <tab-bar />
      <role-drawer />
      <toast-msg />
    </div>
    <div v-else>
      <router-view />
      <toast-msg />
    </div>
  `,
  computed: {
    showBack() {
      return this.$route.path !== '/dashboard' && this.$route.path !== '/' &&
             this.$route.path !== '/boss/dashboard' && this.$route.path !== '/hr/dashboard' && !this.$route.path.startsWith('/admin/');
    },
    pageTitle() {
      const map = {
        '/dashboard': 'WeekSync',
        '/plans': '计划详情',
        '/team': '团队计划',
        '/tasks': '任务',
        '/review': '周复盘',
        '/review/team': '团队复盘',
        '/notifications': '通知中心',
        '/boss/dashboard': '分析看板',
        '/boss/plans': '全员计划',
        '/boss/reports': '组织报告',
        '/hr/dashboard': '合规概览',
        '/hr/analytics': '人员分析',
        '/admin/dashboard': '系统操作台',
        '/admin/personnel': '人员管理',
        '/admin/projects': '项目台账',
      };
      if (this.$route.path.startsWith('/plans/')) return '计划详情';
      return map[this.$route.path] || 'WeekSync';
    },
    pageSubtitle() {
      if (this.$route.path === '/dashboard' || this.$route.path === '/boss/dashboard' || this.$route.path === '/hr/dashboard' || this.$route.path === '/admin/dashboard') {
        const r = roles.find(r2 => r2.id === store.currentRole);
        return r ? `${r.user} · ${r.name}` : '';
      }
      return '';
    }
  }
};

const app = createApp(App);

// Global mixin to expose store and helpers to all component templates
app.mixin({
  computed: {
    store() { return store; },
    roles() { return roles; },
  },
  methods: {
    toast: toast,
    currentUser: currentUser,
    statusLabel: statusLabel,
    priorityLabel: priorityLabel,
    taskStatusLabel: taskStatusLabel,
    sourceLabel: sourceLabel,
    planUserName: planUserName,
    planDept: planDept,
    planApprover: planApprover,
    getDeptMetrics: getDeptMetrics,
    getDeptPolicy: getDeptPolicy,
    createAuditLog: createAuditLog,
    createNotification: createNotification,
    createTodo: createTodo,
  }
});

app.component('app-header', AppHeader);
app.component('tab-bar', TabBar);
app.component('role-drawer', RoleDrawer);
app.component('toast-msg', ToastMsg);
app.component('week-selector', WeekSelector);
app.component('workspace-mode-bar', WorkspaceModeBar);
app.use(router);

// Guard: redirect to role select if no role chosen
router.beforeEach((to, from) => {
  if (!store.currentRole && to.path !== '/') return '/';
});

app.mount('#app');
  </script>
