<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>WeekSync PDCA 周计划协作系统 - 原型演示</title>
  <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://unpkg.com/vue-router@4/dist/vue-router.global.prod.js"></script>
  <style>
    :root {
      --primary: #2563eb;
      --primary-soft: #dbeafe;
      --primary-dark: #1d4ed8;
      --success: #16a34a;
      --success-soft: #dcfce7;
      --warning: #d97706;
      --warning-soft: #fef3c7;
      --danger: #dc2626;
      --danger-soft: #fee2e2;
      --violet: #7c3aed;
      --violet-soft: #ede9fe;
      --cyan: #0891b2;
      --cyan-soft: #cffafe;
      --bg: #f1f5f9;
      --surface: #ffffff;
      --surface-soft: #f8fafc;
      --text: #0f172a;
      --text-2: #475569;
      --text-3: #94a3b8;
      --border: #e2e8f0;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
      --shadow: 0 4px 16px rgba(0,0,0,0.08);
      --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
      --radius: 12px;
      --radius-sm: 8px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { background: linear-gradient(135deg, #f0f4ff 0%, #f1f5f9 50%, #f5f3ff 100%); color: var(--text); font-family: -apple-system, "PingFang SC", "Segoe UI", Roboto, sans-serif; min-height: 100%; }
    body { max-width: 430px; margin: 0 auto; min-height: 100vh; position: relative; border-left: 1px solid rgba(0,0,0,0.04); border-right: 1px solid rgba(0,0,0,0.04); box-shadow: 0 0 60px rgba(0,0,0,0.06); overflow-x: hidden; }
    button, input, textarea, select { font: inherit; }
    button { border: none; background: none; cursor: pointer; }
    input, textarea, select { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px 12px; width: 100%; outline: none; transition: border-color 0.2s; background: var(--surface); }
    input:focus, textarea:focus, select:focus { border-color: var(--primary); }
    a { text-decoration: none; color: inherit; }

    /* App Shell */
    .app-shell { min-height: 100vh; padding-top: 56px; padding-bottom: calc(68px + var(--safe-bottom)); }

    /* Header */
    .header { position: fixed; top: 0; left: 0; right: 0; z-index: 100; max-width: 430px; margin: 0 auto; height: 56px; display: flex; align-items: center; padding: 0 16px; background: rgba(255,255,255,0.92); backdrop-filter: blur(20px) saturate(180%); border-bottom: 1px solid rgba(0,0,0,0.06); }
    .header-back { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; margin-right: 8px; color: var(--text-2); }
    .header-back:active { background: var(--bg); }
    .header-center { flex: 1; min-width: 0; }
    .header-title { font-size: 17px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-sub { font-size: 12px; color: var(--text-3); }
    .header-action { width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; border-radius: 10px; position: relative; }
    .header-action:active { background: var(--bg); }
    .badge-dot { position: absolute; top: 6px; right: 6px; width: 8px; height: 8px; background: var(--danger); border-radius: 50%; border: 2px solid white; }

    /* Bottom Tab Bar */
    .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; z-index: 100; max-width: 430px; margin: 0 auto; background: rgba(255,255,255,0.96); backdrop-filter: blur(20px); border-top: 1px solid rgba(0,0,0,0.06); padding-bottom: var(--safe-bottom); display: flex; }
    .tab-item { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 8px 0 6px; gap: 2px; color: var(--text-3); transition: color 0.2s; position: relative; }
    .tab-item.active { color: var(--primary); }
    .tab-item .tab-icon { font-size: 22px; line-height: 1; }
    .tab-item .tab-label { font-size: 10px; font-weight: 500; }
    .tab-badge { position: absolute; top: 2px; right: 50%; transform: translateX(16px); min-width: 16px; height: 16px; background: var(--danger); color: white; font-size: 10px; font-weight: 600; border-radius: 8px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }

    /* Page Content */
    .page { padding: 16px; padding-bottom: 80px; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes scaleIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    /* Cards */
    .card { background: var(--surface); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow-sm); }
    .card-title { font-size: 15px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
    .card-title .icon { font-size: 18px; }

    /* Stat Cards */
    .stat-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 16px; }
    .stat-card { background: var(--surface); border-radius: var(--radius); padding: 14px; box-shadow: var(--shadow-sm); position: relative; overflow: hidden; }
    .stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .stat-card.blue::before { background: var(--primary); }
    .stat-card.green::before { background: var(--success); }
    .stat-card.orange::before { background: var(--warning); }
    .stat-card.violet::before { background: var(--violet); }
    .stat-card.red::before { background: var(--danger); }
    .stat-card.cyan::before { background: var(--cyan); }
    .stat-label { font-size: 12px; color: var(--text-3); margin-bottom: 6px; }
    .stat-value { font-size: 26px; font-weight: 700; line-height: 1; }
    .stat-value.blue { color: var(--primary); }
    .stat-value.green { color: var(--success); }
    .stat-value.orange { color: var(--warning); }
    .stat-value.violet { color: var(--violet); }
    .stat-value.red { color: var(--danger); }
    .stat-value.cyan { color: var(--cyan); }

    /* Quick Actions Grid */
    .quick-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 16px; }
    .quick-btn { display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 14px 4px; background: var(--surface); border-radius: var(--radius); box-shadow: var(--shadow-sm); transition: transform 0.15s; }
    .quick-btn:active { transform: scale(0.95); }
    .quick-btn .qicon { font-size: 26px; }
    .quick-btn .qlabel { font-size: 11px; color: var(--text-2); font-weight: 500; }

    /* Status Badges */
    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
    .badge-draft { background: #f1f5f9; color: #64748b; }
    .badge-submitted { background: var(--warning-soft); color: var(--warning); }
    .badge-returned { background: var(--danger-soft); color: var(--danger); }
    .badge-approved { background: var(--primary-soft); color: var(--primary); }
    .badge-reviewed { background: var(--success-soft); color: var(--success); }
    .badge-high { background: var(--danger-soft); color: var(--danger); }
    .badge-medium { background: var(--warning-soft); color: var(--warning); }
    .badge-low { background: var(--cyan-soft); color: var(--cyan); }

    /* Task Status */
    .task-status { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
    .ts-todo { background: #f1f5f9; color: #64748b; }
    .ts-progress { background: var(--primary-soft); color: var(--primary); }
    .ts-done { background: var(--success-soft); color: var(--success); }

    /* List Items */
    .list-item { background: var(--surface); border-radius: var(--radius); padding: 14px; margin-bottom: 8px; box-shadow: var(--shadow-sm); transition: transform 0.15s; cursor: pointer; }
    .list-item:active { transform: scale(0.98); }
    .list-item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .list-item-title { font-size: 15px; font-weight: 600; flex: 1; min-width: 0; }
    .list-item-meta { display: flex; gap: 12px; font-size: 12px; color: var(--text-3); margin-top: 4px; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; background: var(--bg); border-radius: 10px; padding: 3px; margin-bottom: 16px; overflow-x: auto; }
    .tab { flex: 1; text-align: center; padding: 8px 12px; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--text-3); white-space: nowrap; transition: all 0.2s; }
    .tab.active { background: var(--surface); color: var(--primary); box-shadow: var(--shadow-sm); font-weight: 600; }

    /* Progress Bar */
    .progress-bar { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 0.6s ease; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; transition: all 0.15s; }
    .btn:active { transform: scale(0.97); }
    .btn-primary { background: var(--primary); color: white; }
    .btn-success { background: var(--success); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-warning { background: var(--warning); color: white; }
    .btn-outline { border: 1.5px solid var(--border); color: var(--text-2); background: var(--surface); }
    .btn-block { width: 100%; }
    .btn-sm { padding: 6px 14px; font-size: 13px; }
    .btn-group { display: flex; gap: 8px; margin-top: 12px; }

    /* Timeline */
    .timeline { padding-left: 24px; position: relative; }
    .timeline::before { content: ''; position: absolute; left: 8px; top: 8px; bottom: 8px; width: 2px; background: var(--border); }
    .tl-item { position: relative; padding-bottom: 20px; padding-left: 20px; }
    .tl-dot { position: absolute; left: -20px; top: 4px; width: 16px; height: 16px; border-radius: 50%; border: 3px solid var(--border); background: white; }
    .tl-dot.done { border-color: var(--success); background: var(--success); }
    .tl-dot.active { border-color: var(--primary); background: var(--primary); animation: pulse 2s infinite; }
    .tl-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .tl-desc { font-size: 12px; color: var(--text-3); }

    /* Modal / Drawer */
    .modal-overlay { position: fixed; inset: 0; z-index: 200; background: rgba(0,0,0,0.5); display: flex; align-items: flex-end; justify-content: center; animation: fadeIn 0.2s ease; }
    .modal-content { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 430px; max-height: 85vh; overflow-y: auto; padding: 20px 16px calc(20px + var(--safe-bottom)); animation: slideUp 0.3s ease; }
    .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .modal-title { font-size: 17px; font-weight: 700; }
    .modal-close { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 50%; background: var(--bg); font-size: 18px; }

    /* Role Selector */
    .role-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 20px 16px; }
    .role-card { background: var(--surface); border-radius: 16px; padding: 20px 16px; text-align: center; box-shadow: var(--shadow); transition: all 0.2s; cursor: pointer; border: 2px solid transparent; }
    .role-card:active { transform: scale(0.97); }
    .role-card.selected { border-color: var(--primary); }
    .role-icon { font-size: 40px; margin-bottom: 10px; }
    .role-name { font-size: 16px; font-weight: 700; margin-bottom: 4px; }
    .role-desc { font-size: 12px; color: var(--text-3); line-height: 1.4; }

    /* Week Selector */
    .week-selector { display: flex; align-items: center; justify-content: space-between; background: var(--surface); border-radius: var(--radius); padding: 10px 14px; margin-bottom: 16px; box-shadow: var(--shadow-sm); }
    .week-nav { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 18px; color: var(--text-2); }
    .week-nav:active { background: var(--bg); }
    .week-label { font-size: 15px; font-weight: 600; text-align: center; }
    .week-date { font-size: 11px; color: var(--text-3); text-align: center; }

    /* Section Title */
    .section-title { font-size: 16px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }

    /* Alert Banner */
    .alert { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; border-radius: var(--radius-sm); margin-bottom: 12px; font-size: 13px; line-height: 1.5; }
    .alert-warning { background: var(--warning-soft); color: #92400e; }
    .alert-danger { background: var(--danger-soft); color: #991b1b; }
    .alert-info { background: var(--primary-soft); color: #1e40af; }
    .alert-success { background: var(--success-soft); color: #166534; }

    /* Task List in Plan */
    .task-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px; background: var(--surface-soft); border-radius: var(--radius-sm); margin-bottom: 8px; border: 1px solid var(--border); }
    .task-check { width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; cursor: pointer; transition: all 0.2s; }
    .task-check.done { background: var(--success); border-color: var(--success); color: white; }
    .task-check.progress { background: var(--primary); border-color: var(--primary); color: white; }
    .task-body { flex: 1; min-width: 0; }
    .task-name { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
    .task-info { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; }

    /* Evaluation Stars */
    .stars { display: inline-flex; gap: 0; align-items: center; }
    .star { font-size: 14px; line-height: 1; opacity: 0.25; filter: grayscale(100%); }
    .star.filled { opacity: 1; filter: none; }

    /* Toast */
    .toast { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); z-index: 300; background: var(--text); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 500; box-shadow: var(--shadow-lg); animation: fadeIn 0.3s ease; white-space: nowrap; }

    /* Empty State */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-3); }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; }

    /* Work Log */
    .log-entry { padding: 12px; background: var(--surface-soft); border-radius: var(--radius-sm); margin-bottom: 8px; border-left: 3px solid var(--primary); }
    .log-time { font-size: 11px; color: var(--text-3); margin-bottom: 4px; }
    .log-content { font-size: 14px; line-height: 1.6; }

    /* Chart placeholder */
    .chart-placeholder { background: var(--surface-soft); border-radius: var(--radius-sm); height: 200px; display: flex; align-items: center; justify-content: center; color: var(--text-3); margin-bottom: 12px; overflow: hidden; position: relative; }
    .bar-chart { display: flex; align-items: flex-end; gap: 8px; height: 160px; padding: 0 20px; width: 100%; }
    .bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; }
    .bar { width: 100%; border-radius: 4px 4px 0 0; transition: height 0.6s ease; }
    .bar-label { font-size: 10px; color: var(--text-3); }

    /* Donut chart */
    .donut-chart { width: 140px; height: 140px; border-radius: 50%; position: relative; margin: 0 auto; }
    .donut-center { position: absolute; inset: 30px; background: var(--surface); border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .donut-value { font-size: 24px; font-weight: 700; }
    .donut-label { font-size: 11px; color: var(--text-3); }

    /* Table */
    .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .data-table th { text-align: left; padding: 8px 10px; background: var(--bg); color: var(--text-3); font-weight: 500; border-bottom: 1px solid var(--border); }
    .data-table td { padding: 10px; border-bottom: 1px solid var(--border); }

    /* Transition groups */
    .fade-enter-active, .fade-leave-active { transition: opacity 0.2s; }
    .fade-enter-from, .fade-leave-to { opacity: 0; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 0; }

    /* Skeleton */
    .skeleton { background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius-sm); }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* Workspace toggle */
    .workspace-bar { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 8px 16px; margin-bottom: 12px; }
    .ws-btn { padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; color: var(--text-3); background: var(--surface); border: 1px solid var(--border); transition: all 0.2s; }
    .ws-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

    /* Score display */
    .score-circle { width: 48px; height: 48px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; font-weight: 700; color: white; }

    /* AI Report */
    .ai-card { background: linear-gradient(135deg, #ede9fe 0%, #dbeafe 100%); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }
    .ai-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .ai-tag { background: var(--violet); color: white; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }

    /* Notification item */
    .notif-item { display: flex; gap: 12px; padding: 14px; background: var(--surface); border-radius: var(--radius); margin-bottom: 8px; box-shadow: var(--shadow-sm); cursor: pointer; }
    .notif-item.unread { border-left: 3px solid var(--primary); }
    .notif-icon { width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .notif-body { flex: 1; min-width: 0; }
    .notif-title { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .notif-desc { font-size: 12px; color: var(--text-3); }
    .notif-time { font-size: 11px; color: var(--text-3); margin-top: 4px; }
  </style>
</head>

// Helpers
function getWeekCode(offset) {
  const d = new Date(2026, 2, 12); // 2026-03-12
  d.setDate(d.getDate() + offset * 7);
  const jan1 = new Date(d.getFullYear(), 0, 1);
  const days = Math.floor((d - jan1) / 86400000);
  const weekNum = Math.ceil((days + jan1.getDay() + 1) / 7);
  return `${d.getFullYear()}-W${String(weekNum).padStart(2, '0')}`;
}

function getWeekRange(offset) {
  const d = new Date(2026, 2, 9); // Monday of W11
  d.setDate(d.getDate() + offset * 7);
  const end = new Date(d);
  end.setDate(end.getDate() + 6);
  const fmt = (dt) => `${dt.getMonth()+1}/${dt.getDate()}`;
  return `${fmt(d)} - ${fmt(end)}`;
}

const PLAN_STATES = {
  draft:     { label: '草稿',   transitions: ['submitted'] },
  submitted: { label: '待审批', transitions: ['approved', 'returned'] },
  returned:  { label: '已退回', transitions: ['submitted'] },
  approved:  { label: '已通过', transitions: ['reviewed'] },
  reviewed:  { label: '已复盘', transitions: [] }
};
const TASK_STATES = {
  todo:      { label: '待开始', transitions: ['progress'] },
  progress:  { label: '进行中', transitions: ['done', 'todo'] },
  done:      { label: '已完成', transitions: ['progress'] },
};

function transitionPlan(plan, targetStatus) {
  const current = PLAN_STATES[plan.status];
  if (!current || !current.transitions.includes(targetStatus)) {
    console.warn('Invalid plan transition: ' + plan.status + ' -> ' + targetStatus);
    return false;
  }
  plan.status = targetStatus;
  return true;
}

function transitionTask(task, targetStatus, userId) {
  const current = TASK_STATES[task.status];
  if (!current || !current.transitions.includes(targetStatus)) {
    console.warn('Invalid task transition: ' + task.status + ' -> ' + targetStatus);
    return false;
  }
  const fromStatus = task.status;
  task.status = targetStatus;
  task.updatedAt = new Date().toISOString();
  store.task_status_logs.push({
    id: Date.now(), taskId: task.taskId, fromStatus, toStatus: targetStatus,
    changedBy: userId, changedAt: new Date().toISOString(), reason: null
  });
  return true;
}

function can(capability, targetUserId) {
  const user = currentUser();
  const caps = PERMISSIONS.capabilities[user.role] || [];
  if (!caps.includes(capability)) return false;
  if (targetUserId && targetUserId !== user.id) {
    if (user.role === 'EMPLOYEE') return false;
    if (user.role === 'MANAGER') {
      const target = store.users.find(u => u.id === targetUserId);
      return target && target.managerId === user.id;
    }
  }
  return true;
}

  return plan.taskIds.map(tid => store.tasks.find(t => t.taskId === tid || t.id === tid)).filter(Boolean);

// ===== P2 #16 + P3 #23: task_assignments 转派支持 =====
// store 中已有 tasks，这里补充 task_assignments 数据在 store 初始化后添加
// 转派流程：原责任人发起 → 主管确认 → 新责任人接受
function reassignTask(taskId, fromUserId, toUserId, reason) {
  const task = store.tasks.find(t => t.taskId === taskId || t.id === taskId);
  if (!task) return null;
  const assignment = {
    id: Date.now(), taskId, fromUserId, toUserId, reason: reason || '',
    status: 'pending', // pending → accepted → rejected
    createdAt: new Date().toISOString(), resolvedAt: null
  };
  store.task_assignments.push(assignment);
  // Notify new assignee
  const fromUser = store.users.find(u => u.id === fromUserId);
  createNotification('task_reassign', 'task', taskId, '收到任务转派', (fromUser?.name || '同事') + '将「' + task.title + '」转派给你，请确认', '🔄', '#eff6ff', [toUserId], '/tasks');
  createTodo(toUserId, 'accept_reassign', 'task', taskId, '确认接收「' + task.title + '」', '由' + (fromUser?.name || '同事') + '转派', '/tasks');
  createAuditLog('task:reassign', 'task', taskId, (fromUser?.name || '') + ' 发起任务转派「' + task.title + '」', { assigneeId: fromUserId }, { assigneeId: toUserId });
  return assignment;
}

function acceptReassignment(assignmentId) {
  const a = store.task_assignments.find(x => x.id === assignmentId);
  if (!a || a.status !== 'pending') return false;
  a.status = 'accepted';
  a.resolvedAt = new Date().toISOString();
  const task = store.tasks.find(t => t.taskId === a.taskId || t.id === a.taskId);
  if (task) {
    task.updatedAt = new Date().toISOString();
  }
  // Add task to receiver's current plan
  const toUser = store.users.find(u => u.id === a.toUserId);
  const weekCode = getWeekCode(store.weekOffset);
  let receiverPlan = store.plans.find(p => p.userId === a.toUserId && p.weekCode === weekCode);
  if (!receiverPlan) {
    receiverPlan = { id: Date.now() + 100, userId: a.toUserId, weekCode: weekCode, status: 'approved', submittedAt: new Date().toISOString(), approvedById: null, taskIds: [] };
    patchPlanDisplayFields2(receiverPlan);
    store.plans.push(receiverPlan);
    patchPlanTasks();
  }
  if (task) {
    const clonedTask = { ...task, id: Date.now(), taskId: Date.now(), planId: receiverPlan.id, assigneeId: a.toUserId, source: 'reassigned', status: 'todo', reviewResult: null, score: null, createdAt: new Date().toISOString(), updatedAt: null };
    store.tasks.push(clonedTask);
    receiverPlan.taskIds.push(clonedTask.taskId);
  }
  createNotification('reassign_accepted', 'task', a.taskId, '转派已接受', (toUser?.name || '同事') + '已接受「' + (task?.title || '') + '」，任务已添加到对方执行清单', '✅', 'var(--success-soft)', [a.fromUserId], '/tasks');
  createAuditLog('task:reassign_accept', 'task', a.taskId, (toUser?.name || '同事') + ' 接受了任务转派「' + (task?.title || '') + '」', { status: 'pending' }, { status: 'accepted' });
  return true;
}

function rejectReassignment(assignmentId, reason) {
  const a = store.task_assignments.find(x => x.id === assignmentId);
  if (!a || a.status !== 'pending') return false;
  a.status = 'rejected';
  a.resolvedAt = new Date().toISOString();
  const task = store.tasks.find(t => t.taskId === a.taskId || t.id === a.taskId);
  const toUser = store.users.find(u => u.id === a.toUserId);
  createNotification('reassign_rejected', 'task', a.taskId, '转派被拒绝', (toUser?.name || '同事') + '拒绝了「' + (task?.title || '') + '」的转派' + (reason ? '：' + reason : ''), '❌', '#fef2f2', [a.fromUserId], '/tasks');
  return true;
}

// ===== P2 #19: 通知兼容层 + 创建通知 =====
function buildNotificationsCompat() {
  // Merge notification_events + user_notifications into old-style notifications for backward compat
  const roleUserMap = { EMPLOYEE: 1, EMPLOYEE2: 2, MANAGER: 3, HR: 4, BOSS: 5, ADMIN: 6, EMPLOYEE3: 11 };
  const userId = roleUserMap[store.currentRole] || 1;
  const myNotifs = store.user_notifications.filter(un => un.userId === userId);
  return myNotifs.map(un => {
    const evt = store.notification_events.find(e => e.id === un.eventId);
    if (!evt) return null;
    const hours = Math.floor((Date.now() - new Date(evt.createdAt).getTime()) / 3600000);
    const timeLabel = hours < 1 ? '刚刚' : hours < 24 ? hours + '小时前' : Math.floor(hours/24) + '天前';
    return {
      id: un.id, type: evt.type, title: evt.title, desc: evt.desc,
      time: timeLabel, unread: !un.read, icon: evt.icon, iconBg: evt.iconBg,
      link: un.link, _userNotifId: un.id
    };
  }).filter(Boolean);
}

function createNotification(type, targetType, targetId, title, desc, icon, iconBg, recipientUserIds, link) {
  const actor = currentUser();
  const evtId = Date.now();
  store.notification_events.push({
    id: evtId, type, targetType, targetId, actorId: actor.id,
    title, desc, icon, iconBg, createdAt: new Date().toISOString()
  });
  recipientUserIds.forEach((uid, i) => {
    store.user_notifications.push({
      id: evtId * 10 + i, userId: uid, eventId: evtId, read: false,
      link: typeof link === 'function' ? link(uid) : link
    });
  });
  // Keep legacy notifications array updated for components still using it
  refreshLegacyNotifications();
}

function createTodo(userId, type, targetType, targetId, title, desc, link) {
  store.user_todos.push({
    id: Date.now(), userId, type, targetType, targetId, title, desc, link, done: false, createdAt: new Date().toISOString()
  });
}

function refreshLegacyNotifications() {
  store.notifications.length = 0;
  const all = buildNotificationsCompat();
  all.forEach(n => store.notifications.push(n));
}

      const roleMap2 = { EMPLOYEE: 1, EMPLOYEE2: 2, MANAGER: 3, HR: 4, BOSS: 5, ADMIN: 6, EMPLOYEE3: 11 };
      const uid2 = roleMap2[role] || 1;
      const week2 = getWeekCode(store.weekOffset);
      const curPlan = store.plans.find(p => p.userId === uid2 && p.weekCode === week2);
      const isExec = curPlan && curPlan.status === 'approved';
      return [
        { path: '/dashboard', icon: '🏠', label: '首页' },
        { path: '/tasks', icon: isExec ? '⚡' : '📋', label: isExec ? '执行' : '计划' },
        { path: '/review', icon: '📊', label: '复盘' },
        { path: '/notifications', icon: '🔔', label: '消息', badge: nb },
      ];
    }
  },
  methods: {
    isActive(t) {
      return this.$route.path === t.path || this.$route.path.startsWith(t.path + '/');
    }
  }
};

        </div>
        <div class="role-grid">
          <div v-for="r in roles" :key="r.id" class="role-card" :class="{ selected: store.currentRole === r.id }" @click="selectRole(r.id)">
            <div class="role-icon">{{ r.icon }}</div>

            <div class="role-desc">{{ r.user }} · {{ r.desc }}</div>
          </div>
        </div>
      </div>
    </div>
  `,
  watch: {
    'store.showRoleDrawer'(v) {
      if (v) { this._escHandler = (e) => { if (e.key === 'Escape') this.close(); }; document.addEventListener('keydown', this._escHandler); }
      else if (this._escHandler) { document.removeEventListener('keydown', this._escHandler); this._escHandler = null; }
    }
  },
  beforeUnmount() { if (this._escHandler) document.removeEventListener('keydown', this._escHandler); },
  methods: {
    close() { store.showRoleDrawer = false; },
    selectRole(id) {
      if (id === store.currentRole) { this.close(); return; }
      store.currentRole = id;
      store.workspace = 'personal';
      this.close();
      if (id === 'ADMIN') this.$router.push('/admin/dashboard');
      else if (id === 'BOSS') {
        store.workspace = 'organization';
        this.$router.push('/boss/dashboard');
      } else this.$router.push('/dashboard');
      toast(`✅ 已切换到${roles.find(r=>r.id===id).name}视角 · ${roles.find(r=>r.id===id).user}`);
    }
  }
};

            <div style="font-size:10px;color:var(--text-3);margin-bottom:2px;">涉及项目</div>
            <div style="font-size:16px;font-weight:700;color:var(--text);">2</div>
          </div>

            <div style="font-size:16px;font-weight:700;color:var(--text);">22</div>

        </div><!-- end showHistory -->

      <!-- ============ 近12周概览 (Manager) ============ -->
      <div v-if="isManager" style="background:var(--surface);border-radius:16px;padding:16px;box-shadow:var(--shadow-sm);margin-bottom:14px;">
        <div style="display:flex;align-items:center;gap:6px;margin-bottom:12px;">
          <span style="font-size:16px;">📈</span>
          <span style="font-size:15px;font-weight:700;">近12周概览</span>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;">
          <div style="text-align:center;">
            <div style="font-size:18px;font-weight:800;color:var(--success);">82%</div>
            <div style="font-size:10px;color:var(--text-3);margin-top:2px;">完成率</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:18px;font-weight:800;color:var(--primary);">36</div>
            <div style="font-size:10px;color:var(--text-3);margin-top:2px;">完成任务</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:18px;font-weight:800;color:var(--warning);">3</div>
            <div style="font-size:10px;color:var(--text-3);margin-top:2px;">获权延期</div>
          </div>
          <div style="text-align:center;">
            <div style="font-size:18px;font-weight:800;color:var(--danger);">2</div>

    </div>
  `,
  computed: {
    user() { return currentUser(); },
    roleInfo() { return roles.find(r => r.id === store.currentRole) || roles[0]; },
    isManager() { return store.currentRole === 'MANAGER'; },
    isBoss() { return store.currentRole === 'BOSS'; },
    isHR() { return store.currentRole === 'HR'; },
    roleLabel() { return { EMPLOYEE:'员工', EMPLOYEE2:'员工', EMPLOYEE3:'员工', MANAGER:'主管', HR:'HR', ADMIN:'管理员', BOSS:'CEO' }[store.currentRole] || ''; },
    rolePositioning() {
      return { EMPLOYEE:'你本周该做什么 → 完成自己的周闭环', EMPLOYEE2:'你本周该做什么 → 完成自己的周闭环', EMPLOYEE3:'你本周该做什么 → 完成自己的周闭环', MANAGER:'这些需要你拍板 → 推动团队闭环', HR:'哪里不合规 → 抓提交、看异常', BOSS:'哪里有组织风险 → 看偏差、看趋势', ADMIN:'哪里要配置 → 系统维护与规则' }[store.currentRole] || '';
    },
    greeting() {
      const h = new Date().getHours();
      if (h < 12) return '上午好';
      if (h < 18) return '下午好';
      return '晚上好';
    },
    lastWeekCode() { return getWeekCode(store.weekOffset - 1).split('-')[1]; },
    currentPlan() { return store.plans.find(p => p.userId === this.user.id && p.weekCode === getWeekCode(store.weekOffset)); },
    empTasks() { return this.currentPlan ? this.currentPlan.tasks : []; },
    empCompletionRate() {
      const tasks = this.empTasks;
      if (!tasks.length) return 0;
      return Math.round(tasks.filter(t => t.status === 'done').length / tasks.length * 100);
    },
    workLogCount() {
      return store.workLogs.filter(l => l.userId === this.user.id).length;
    },
    unreadCount() {
      const roleMap = { EMPLOYEE: 1, EMPLOYEE2: 2, MANAGER: 3, HR: 4, BOSS: 5, ADMIN: 6, EMPLOYEE3: 11 };
      const uid = roleMap[store.currentRole] || 1;
      const unreadNotifs = store.user_notifications.filter(un => un.userId === uid && !un.read).length;
      const pendingTodos = store.user_todos.filter(t => t.userId === uid && !t.done).length;
      return unreadNotifs + pendingTodos;
    },
    planStatusHeadline() {
      if (!this.currentPlan) return '本周尚未创建计划';
      const s = this.currentPlan.status;
      if (s === 'draft') return '本周计划草稿待提交';
      if (s === 'submitted') return '计划已提交，等待审批';
      if (s === 'returned') return '计划已被退回，请修改';
      if (s === 'approved') return '计划已审批，正在执行中';
      if (s === 'reviewed') return '本周闭环已进入复盘阶段';
      return '本周计划进行中';
    },
    planStatusDesc() {
      if (!this.currentPlan) return '前往计划页创建本周计划，开始 PDCA 闭环。';
      const s = this.currentPlan.status;
      if (s === 'draft') return '请完善任务并提交，等待主管审批。';
      if (s === 'submitted') return '计划已提交，请等待主管审批通过。';
      if (s === 'returned') return '请查看退回意见并修改后重新提交。';
      if (s === 'approved') return '专注任务执行，完成后可申请主管评估。';
      if (s === 'reviewed') return '本周计划已完成评估，可以查看复盘内容和历史复盘记录。';
      return '';
    },
    workflowSteps() {
      const p = this.currentPlan;
      if (!p) return [
        { label: '计划', done: false, active: true },
        { label: '审批', done: false, active: false },
        { label: '执行', done: false, active: false },
        { label: '评估', done: false, active: false },
        { label: '复盘', done: false, active: false },
      ];
      const s = p.status;
      const allDone = s === 'approved' && p.tasks.length > 0 && p.tasks.every(t => t.status === 'done');
      const allEvaluated = allDone && p.tasks.every(t => t.reviewResult);
      let step;
      if (s === 'draft' || s === 'returned') step = 1;
      else if (s === 'submitted') step = 2;
      else if (s === 'approved' && !allDone) step = 3;
      else if (s === 'approved' && allDone && !allEvaluated) step = 4;
      else if (s === 'approved' && allEvaluated) step = 4.5;
      else if (s === 'reviewed') step = 5;
      else step = 1;
      return [
        { label: '计划', done: step > 1, active: step === 1 },
        { label: s === 'submitted' ? '待审批' : (step > 2 ? '已审批' : '审批'), done: step > 2, active: step === 2 },
        { label: '执行', done: step > 3, active: step === 3 },
        { label: allDone && !allEvaluated ? '待评估' : (allEvaluated || s === 'reviewed' ? '已评估' : '评估'), done: step > 4, active: step === 4 },
        { label: '复盘', done: step >= 5, active: step === 5 },
      ];
    },
    todayTodoItems() {
      const items = [];
      const plan = this.currentPlan;
      if (!plan || plan.status === 'draft') {
        items.push({ icon: '📝', title: '填写并提交本周计划', sub: '计划提交后等待主管审批', action: () => this.$router.push('/tasks') });
      }
      if (plan && plan.status === 'returned') {
        items.push({ icon: '↩️', title: '修改退回的计划并重新提交', sub: '请查看退回意见', action: () => this.$router.push('/plans/' + plan.id) });
      }
      if (plan && plan.status === 'approved') {
        const progressTasks = plan.tasks.filter(t => t.status === 'progress');
        const todoTasks = plan.tasks.filter(t => t.status === 'todo');
        progressTasks.slice(0, 2).forEach(t => {
          items.push({ icon: '⚡', title: '继续推进：' + t.title, sub: t.project || '截止 ' + t.dueDate, action: () => this.$router.push('/tasks') });
        });
        todoTasks.slice(0, 1).forEach(t => {
          items.push({ icon: '🎯', title: '开始执行：' + t.title, sub: t.project || '截止 ' + t.dueDate, action: () => this.$router.push('/tasks') });
        });
      }
      if (this.unreadCount > 0) {
        items.push({ icon: '🔔', title: '处理 ' + this.unreadCount + ' 条未读消息', sub: '点击查看通知中心', action: () => this.$router.push('/notifications') });
      }
      if (plan && plan.status === 'reviewed') {
        items.push({ icon: '📊', title: '查看本周复盘内容', sub: '本周闭环已完成', action: () => this.$router.push('/review') });
      }
      return items.slice(0, 5);
    },
    pendingApprovalPlans() {
      const myId = currentUser().id;
      const week = getWeekCode(store.weekOffset);
      return store.plans.filter(p => p.weekCode === week && p.status === 'submitted' && p.userId !== myId);
    },
    pendingEvalItems() {
      const myId = currentUser().id;
      const week = getWeekCode(store.weekOffset);
      return store.plans
        .filter(p => p.weekCode === week && p.status === 'approved' && p.userId !== myId)
        .flatMap(p => p.tasks.filter(t => t.status === 'done' && !t.reviewResult)
          .map(t => ({ task: t, planId: p.id, userName: p.userName, weekCode: p.weekCode })));
    },
    pendingDelayTasks() {
      const myId = currentUser().id;
      const week = getWeekCode(store.weekOffset);
      return store.plans
        .filter(p => p.weekCode === week && p.userId !== myId)
        .flatMap(p => p.tasks.filter(t => t.delayRequested)
          .map(t => ({ task: t, planId: p.id, userName: p.userName, weekCode: p.weekCode })));
    },
    pendingInsertTasks() {
      const myId = currentUser().id;
      const week = getWeekCode(store.weekOffset);
      return store.plans
        .filter(p => p.weekCode === week && p.status === 'approved' && p.userId !== myId)
        .flatMap(p => p.tasks.filter(t => t.pendingApproval)
          .map(t => ({ task: t, planId: p.id, userName: p.userName, weekCode: p.weekCode })));
    },
    pendingCollabRequests() {
      // Collab requests sent TO this user (as dept manager) that are pending
      const uid = currentUser().id;
      const week = getWeekCode(store.weekOffset);
      return store.plans.filter(p => p.weekCode === week)
        .flatMap(p => p.tasks.filter(t => t.collabStatus === 'pending_hr' && t.collabTargetUserId === uid)
          .map(t => {
            const owner = store.users.find(u => u.id === p.userId);
            return { task: t, planId: p.id, userName: p.userName, ownerName: owner?.name || '同事' };
          }));
    },
    pendingCollabReceipts() {
      const myId = currentUser().id;
      const week = getWeekCode(store.weekOffset);
      return store.plans.filter(p => p.weekCode === week && p.userId !== myId)
        .flatMap(p => p.tasks.filter(t => t.collabStatus === 'receipt_submitted')
          .map(t => {
            const owner = store.users.find(u => u.id === p.userId);
            return { task: t, planId: p.id, userName: p.userName, ownerName: owner?.name || '同事' };
          }));
    },
    todoQueues() {
      const approveCount = this.pendingApprovalPlans.length + this.pendingInsertTasks.length;
      const delayCount = this.pendingDelayTasks.length;
      const collabCount = this.pendingCollabRequests.length + this.pendingCollabReceipts.length;
      return [
        { key: 'approve',  label: '待审批',  count: approveCount, color: 'var(--warning)', detail: approveCount > 0 ? (this.pendingApprovalPlans.length > 0 ? this.pendingApprovalPlans.length + '条计划' : '') + (this.pendingApprovalPlans.length > 0 && this.pendingInsertTasks.length > 0 ? ' + ' : '') + (this.pendingInsertTasks.length > 0 ? this.pendingInsertTasks.length + '项插入任务' : '') + '待审批' : '' },
        { key: 'evaluate', label: '待评估',  count: this.pendingEvalItems.length,    color: 'var(--success)', detail: this.pendingEvalItems.length + '项任务待评估' },
        { key: 'duedate',  label: '待改期',  count: delayCount,   color: 'var(--violet)',  detail: delayCount + '条改期审批待处理' },

                background: teamFilter === f.value ? 'var(--primary)' : 'var(--surface-soft)',

              <div style="font-size:10px;color:var(--text-3);">已提交</div>

              <div style="font-size:10px;color:var(--text-3);">待审批</div>
            </div>

              <div style="font-size:10px;color:var(--text-3);">已通过</div>

                  <span v-else class="badge badge-draft">未创建</span>

                <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" :style="t.status === 'done' ? 'color:var(--text-3);text-decoration:line-through' : ''">{{ t.title }}</span>

      <!-- 协办指派经办人弹窗（新建任务表单） -->

        <div style="background:white;border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom);">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 16px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:white;z-index:1;">

              <div style="font-size:12px;color:#0284c7;font-weight:600;margin-bottom:4px;">📋 协办请求来自</div>
              <div style="font-size:13px;font-weight:600;">{{ collabAssignTask.title }}</div>

            <div style="display:flex;gap:10px;margin-bottom:14px;">

            <!-- 所属项目 -->
            <div style="margin-bottom:14px;">
              <div style="font-size:13px;font-weight:600;margin-bottom:6px;">所属项目</div>
              <select v-model="collabNewProject" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;background:white;box-sizing:border-box;">
                <option value="">不选择项目</option>

              </select>

            <!-- 可交付物 -->
            <div style="margin-bottom:14px;">
              <div style="font-size:13px;font-weight:600;margin-bottom:6px;">可交付物 <span style="color:var(--danger);">*</span></div>
              <input v-model="collabNewDeliverable" placeholder="描述可交付成果" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;box-sizing:border-box;" />
            </div>

            <div style="margin-bottom:14px;">
              <div style="font-size:13px;font-weight:600;margin-bottom:6px;">任务描述</div>
              <textarea v-model="collabNewDesc" rows="2" placeholder="补充任务说明（选填）" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;box-sizing:border-box;resize:none;"></textarea>
            </div>
            <!-- 提交按钮 -->
            <button class="btn btn-primary btn-block" style="min-height:44px;border-radius:12px;" :disabled="!collabAssignHandlerId || !collabNewTitle || !collabNewDue || !collabNewDeliverable" @click="confirmCollabAssign">✅ 确认接收并创建经办任务</button>
          </div>
        </div>
      </div>

      <!-- 插入任务弹窗 -->
      <div v-if="showInsertTaskModal" class="modal-overlay" @click.self="showInsertTaskModal = false" style="align-items:flex-end;">
        <div style="background:white;border-radius:20px 20px 0 0;width:100%;max-height:88vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom);">
          <div style="display:flex;justify-content:space-between;align-items:center;padding:16px 16px 12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:white;z-index:1;">
            <span style="font-size:16px;font-weight:700;">插入任务</span>
            <button style="background:none;border:none;color:var(--text-3);font-size:15px;cursor:pointer;padding:4px 8px;" @click="showInsertTaskModal = false">取消</button>
          </div>
          <div style="padding:14px 16px;">
            <div style="margin-bottom:14px;">
              <div style="font-size:13px;font-weight:600;margin-bottom:8px;">任务类型</div>
              <div style="display:flex;gap:8px;">
                <button :style="insertTaskType === 'midweek' ? 'background:var(--primary);color:white;' : 'background:#f3f4f6;color:var(--text-2);'" style="flex:1;padding:10px 8px;border:none;border-radius:8px;font-size:13px;cursor:pointer;" @click="insertTaskType = 'midweek'">周中插入任务</button>
                <button :style="insertTaskType === 'next' ? 'background:var(--primary);color:white;' : 'background:#f3f4f6;color:var(--text-2);'" style="flex:1;padding:10px 8px;border:none;border-radius:8px;font-size:13px;cursor:pointer;" @click="insertTaskType = 'next'">下周计划任务</button>
              </div>

            <div style="margin-bottom:14px;">
              <div style="font-size:13px;font-weight:600;margin-bottom:6px;">标题 <span style="color:var(--danger);">*</span></div>
              <input v-model="insertTaskTitle" placeholder="输入任务标题" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;box-sizing:border-box;" />
            </div>
            <div style="margin-bottom:14px;">
              <div style="font-size:13px;font-weight:600;margin-bottom:6px;">所属项目</div>
              <select v-model="insertTaskProject" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;background:white;box-sizing:border-box;">
                <option value="">不选择项目</option>
                <option v-for="p in store.projects.filter(p=>p.status==='approved')" :key="p.id" :value="p.name">{{ p.name }}</option>
              </select>
            </div>
            <div style="display:flex;gap:10px;margin-bottom:14px;">
              <div style="flex:1;">
                <div style="font-size:13px;font-weight:600;margin-bottom:6px;">优先级</div>
                <select v-model="insertTaskPriority" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;background:white;box-sizing:border-box;">
                  <option value="high">高</option>
                  <option value="medium">中</option>
                  <option value="low">低</option>
                </select>
              </div>
              <div style="flex:1;">
                <div style="font-size:13px;font-weight:600;margin-bottom:6px;">截止日期 <span style="color:var(--danger);">*</span></div>
                <input type="date" v-model="insertTaskDue" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;box-sizing:border-box;" />
              </div>
            </div>
            <div style="margin-bottom:14px;">
              <div style="font-size:13px;font-weight:600;margin-bottom:6px;">可交付物 <span style="color:var(--danger);">*</span></div>
              <input v-model="insertTaskDeliverable" placeholder="描述可交付成果" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;box-sizing:border-box;" />
            </div>
            <div style="margin-bottom:14px;">
              <div style="font-size:13px;font-weight:600;margin-bottom:6px;">任务描述</div>
              <textarea v-model="insertTaskDesc" rows="2" placeholder="补充任务说明（选填）" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;box-sizing:border-box;resize:none;"></textarea>
            </div>
            <!-- 主管特有：创建协办任务 -->
            <div v-if="isManager || isHR" style="margin-bottom:14px;">
              <div style="font-size:13px;font-weight:600;margin-bottom:6px;">协办部门负责人（可选） <span style="font-size:11px;color:var(--text-3);font-weight:400;">协办请求将发给该负责人，由其指派经办人</span></div>
              <select v-model="insertTaskCollabDept" style="width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;background:white;box-sizing:border-box;">
                <option value="">不需要协办</option>
                <option v-for="u in insertCollabCandidates" :key="u.id" :value="u.id">{{ u.name }} · {{ u.dept }}</option>
              </select>
              <div v-if="insertTaskCollabDept" style="font-size:11px;color:var(--primary);margin-top:4px;">将自动通知该负责人接收并指派经办人</div>
            </div>
            <button class="btn btn-primary btn-block" style="min-height:44px;border-radius:12px;" :disabled="!insertTaskTitle || !insertTaskDue || !insertTaskDeliverable" @click="insertTask">保存</button>
          </div>
        </div>
      </div>
    </div>
  `,
  computed: {
    // Plan computed
    isManager() { return store.currentRole === 'MANAGER' || store.currentRole === 'BOSS'; },
    isHR() { return store.currentRole === 'HR'; },
    deptName() {
      const u = currentUser();
      const d = store.departments.find(d => d.id === u.deptId);
      return d ? d.name : (u.dept || '本部门');
    },
    currentPlan() {
      const uid = currentUser().id;
      return store.plans.find(p => p.userId === uid && p.weekCode === getWeekCode(store.weekOffset));
    },
    pageMode() {
      const plan = this.currentPlan;
      if (!plan || ['draft','submitted','returned'].includes(plan.status)) return 'plan';
      if (plan.status === 'approved') return 'execution';
      return 'reviewed';
    },
    pageTitle() {
      if (this.view === 'team') return '团队计划';
      if (this.pageMode === 'execution') return '执行';
      if (this.pageMode === 'reviewed') return '任务';
      return this.isManager ? '我的计划' : '计划';
    },
    historyPlans() {
      const uid = currentUser().id;
      const current = getWeekCode(store.weekOffset);
      return store.plans.filter(p => p.userId === uid && p.weekCode !== current);
    },
    completionRate() {
      if (!this.currentPlan) return 0;
      const tasks = this.currentPlan.tasks;
      if (!tasks.length) return 0;
      return Math.round(tasks.filter(t => t.status === 'done').length / tasks.length * 100);
    },
    // Team computed
    members() {
      return [
        { id: 1, name: '张伟', dept: '软件部', plan: store.plans.find(p => p.userId === 1 && p.weekCode === getWeekCode(store.weekOffset)) },
        { id: 2, name: '李娜', dept: '软件部', plan: store.plans.find(p => p.userId === 2 && p.weekCode === getWeekCode(store.weekOffset)) },
      ].map(m => { if (m.plan) { m.total = m.plan.tasks.length; m.done = m.plan.tasks.filter(t => t.status === 'done').length; m.rate = m.total ? Math.round(m.done / m.total * 100) : 0; } else { m.total = 0; m.done = 0; m.rate = 0; } return m; });
    },
    submittedCount() { return this.members.filter(m => m.plan).length; },
    pendingCount() { return this.members.filter(m => m.plan && m.plan.status === 'submitted').length; },
    approvedCount() { return this.members.filter(m => m.plan && (m.plan.status === 'approved' || m.plan.status === 'reviewed')).length; },
    submitRate() { return this.members.length ? Math.round(this.submittedCount / this.members.length * 100) : 0; },
    teamFilterOptions() {
      return [
        { value: 'all', label: '全部' }, { value: 'submitted', label: '待审批' },
        { value: 'approved', label: '已通过' }, { value: 'returned', label: '已退回' },
        { value: 'high_risk', label: '高风险' },
      ];
    },
    filteredMembers() {
      if (this.teamFilter === 'all') return this.members;
      if (this.teamFilter === 'high_risk') return this.members.filter(m => m.plan && m.plan.tasks.some(t => t.priority === 'high' && t.status !== 'done'));
      return this.members.filter(m => m.plan && m.plan.status === this.teamFilter);
    },
    deptProjects() { const userDept = currentUser().dept; return store.projects.filter(p => p.dept === userDept || p.level === 'company'); },
    // Execution computed
    canUpdateStatus() { return this.currentPlan && this.currentPlan.status === 'approved'; },
    allTasks() { return this.currentPlan ? this.currentPlan.tasks : []; },
    totalCount() { return this.allTasks.length; },
    todoCount() { return this.allTasks.filter(t => t.status === 'todo').length; },
    progressCount() { return this.allTasks.filter(t => t.status === 'progress').length; },
    doneCount() { return this.allTasks.filter(t => t.status === 'done').length; },
    allTasksDone() { return this.totalCount > 0 && this.doneCount === this.totalCount; },
    allTasksEvaluated() {
      if (!this.allTasksDone) return false;
      const myPlans = store.plans.filter(p => p.userId === currentUser().id && p.status === 'approved');
      if (!myPlans.length) return false;
      const doneTasks = myPlans.flatMap(p => p.tasks).filter(t => t.status === 'done');
      return doneTasks.length > 0 && doneTasks.every(t => t.reviewResult);
    },
    pendingEvalCount() {
      const plans = store.plans.filter(p => p.status === 'approved' && p.userId !== currentUser().id);
      let count = 0;
      plans.forEach(p => { count += p.tasks.filter(t => t.status === 'done' && !t.reviewResult).length; });
      return count;
    },
    pendingEvalTask() {
      const plans = store.plans.filter(p => p.status === 'approved' && p.userId !== currentUser().id);
      for (const p of plans) {
        const t = p.tasks.find(t => t.status === 'done' && !t.reviewResult);
        if (t) return t.title;
      }
      return '';
    },
    reassignCandidates() {
      const uid = currentUser().id;
      return store.users.filter(u => u.id !== uid && u.isActive && (u.role === 'EMPLOYEE' || u.role === 'MANAGER'));
    },
    collabAssignCandidates() {
      const uid = currentUser().id;
      const myDeptId = currentUser().deptId;
      return store.users.filter(u => u.isActive && (u.id === uid || u.deptId === myDeptId || u.managerId === uid));
    },
    insertCollabCandidates() {
      const uid = currentUser().id;
      return store.users.filter(u => u.isActive && u.id !== uid && (u.role === 'MANAGER' || u.role === 'HR'));
    },
    filteredTasks() {
      let tasks = this.allTasks;
      if (this.statusFilter !== 'all') tasks = tasks.filter(t => t.status === this.statusFilter);
      const statusRank = { progress: 0, todo: 1, done: 2 };
      const pRank = { high: 0, medium: 1, low: 2 };
      return [...tasks].sort((a, b) => {
        const sa = statusRank[a.status] ?? 1, sb = statusRank[b.status] ?? 1;
        if (sa !== sb) return sa - sb;
        const pa = pRank[a.priority] ?? 1, pb = pRank[b.priority] ?? 1;
        if (pa !== pb) return pa - pb;
        return (a.dueDate || '').localeCompare(b.dueDate || '');
      });
    },
    filterOptions() {
      return [
        { value: 'all', label: '全部' }, { value: 'todo', label: '待开始' },
        { value: 'progress', label: '执行中' }, { value: 'done', label: '已完成' },
      ];
    },
    incomingReassignments() {
      const uid = currentUser().id;
      return store.task_assignments.filter(a => a.toUserId === uid && a.status === 'pending').map(a => {
        const task = store.tasks.find(t => t.taskId === a.taskId || t.id === a.taskId);
        const fromUser = store.users.find(u => u.id === a.fromUserId);
        return { ...a, task, fromUserName: fromUser?.name || '同事' };
      });
    },
    incomingCollabs() {
      const uid = currentUser().id;
      const allPlans = store.plans.filter(p => p.weekCode === getWeekCode(store.weekOffset));
      const collabTasks = [];
      allPlans.forEach(p => {
        p.tasks.forEach(t => {
          if (t.collabStatus === 'pending_hr') {
            // Check if this user is the collab target (dept manager) OR has a pending todo
            const isTarget = t.collabTargetUserId === uid;
            const hasTodo = store.user_todos.some(td => td.userId === uid && td.type === 'accept_collab' && td.targetId === (t.taskId || t.id) && !td.done);
            if (isTarget || hasTodo) {
              const owner = store.users.find(u => u.id === p.userId);
              const initiator = store.users.find(u => u.id === t.collabInitiatorId);
              collabTasks.push({ ...t, planId: p.id, ownerName: initiator?.name || owner?.name || '同事', planUserId: p.userId });
            }
          }
        });
      });
      return collabTasks;
    },
    myPendingTodos() {
      return store.user_todos.filter(t => t.userId === currentUser().id && !t.done);
    },
    todayLogs() { return store.workLogs.filter(l => l.userId === currentUser().id).slice(0, 5); },
    planApproverName() {
      if (!this.currentPlan || !this.currentPlan.approvedById) return '待分配';
      const u = store.users.find(u => u.id === this.currentPlan.approvedById);
      return u ? u.name : '主管';
    },
    flowLogs() {
      const p = this.currentPlan;
      if (!p || p.status === 'draft') return [];
      const logs = [];
      const taskIds = (p.taskIds || []).concat(p.tasks.map(t => t.taskId || t.id));
      const uniqueTaskIds = [...new Set(taskIds)];
      if (p.submittedAt) logs.push({ icon: '📤', bg: '#eff6ff', title: p.userName + ' 提交了周计划', detail: '共 ' + p.tasks.length + ' 项任务', time: p.submittedAt });
      if (p.status === 'returned' && p.returnComment) {
        const retLog = store.auditLogs.find(l => l.action === 'plan:return' && l.targetId === p.id);
        const retUser = retLog ? (store.users.find(u => u.id === retLog.actorId)?.name || '') : (p.approvedBy || '主管');
        logs.push({ icon: '↩️', bg: '#fef2f2', title: retUser + ' 退回了计划', detail: p.returnComment, detailBg: '#fef2f2', detailColor: '#dc2626', time: retLog ? new Date(retLog.timestamp).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '' });
      }
      if (['approved', 'reviewed'].includes(p.status)) {
        const appLog = store.auditLogs.find(l => l.action === 'plan:approve' && l.targetId === p.id);
        const appUser = p.approvedBy || (appLog ? (store.users.find(u => u.id === appLog.actorId)?.name || '主管') : '主管');
        logs.push({ icon: '✅', bg: '#dcfce7', title: appUser + ' 审批通过', detail: '计划进入执行阶段', time: appLog ? new Date(appLog.timestamp).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '' });
      }
      const taskLogs = store.task_status_logs.filter(l => uniqueTaskIds.includes(l.taskId));
      const statusNames = { todo: '待开始', progress: '执行中', done: '已完成' };
      taskLogs.forEach(l => {
        const task = p.tasks.find(t => (t.taskId || t.id) === l.taskId);
        const user = store.users.find(u => u.id === l.changedBy);
        const taskTitle = task ? task.title : '任务';
        let icon = '🔄', bg = '#f3f4f6';
        if (l.toStatus === 'progress') { icon = '▶️'; bg = '#dbeafe'; }
        if (l.toStatus === 'done') { icon = '✔️'; bg = '#dcfce7'; }
        if (l.toStatus === 'todo') { icon = '↩️'; bg = '#fef3c7'; }
        logs.push({ icon, bg, title: (user ? user.name : '') + ' 将「' + taskTitle + '」从' + (statusNames[l.fromStatus] || l.fromStatus) + '改为' + (statusNames[l.toStatus] || l.toStatus), time: l.changedAt || '' });
      });
      p.tasks.forEach(t => {
        if (t.reviewResult) {
          const review = store.task_reviews.find(r => r.taskId === (t.taskId || t.id));
          const resultLabels = { completed: '已完成', incomplete: '未完成', authorized_delay: '获权延期' };
          const reviewer = review ? (store.users.find(u => u.id === review.reviewerId)?.name || '主管') : '主管';

    taskDisplayStatus(t) {

      // Check for pending reassignment (转派中)
      const pendingReassign = store.task_assignments.find(a => a.taskId === (t.taskId || t.id) && a.status === 'pending');
      if (pendingReassign) return { label: '转派中', bg: '#eff6ff', color: '#2563eb' };
      // Check for accepted reassignment (已转派)
      const acceptedReassign = store.task_assignments.find(a => a.taskId === (t.taskId || t.id) && a.fromUserId === currentUser().id && a.status === 'accepted');
      if (acceptedReassign) return { label: '已转派', bg: '#f0fdf4', color: '#16a34a' };
      // Check for rejected reassignment (转派被拒)
      const rejectedReassign = store.task_assignments.find(a => a.taskId === (t.taskId || t.id) && a.fromUserId === currentUser().id && a.status === 'rejected');
      if (rejectedReassign) return { label: '转派被拒，需自行执行', bg: '#fef2f2', color: '#dc2626' };
      // Check for authorized delay
      if (t.reviewResult === 'authorized_delay') return { label: '获权延期', bg: '#fef3c7', color: '#d97706' };
      // Check for pending delay request
      if (t.delayRequested) return { label: '延期申请中', bg: '#fef3c7', color: '#d97706' };
      // Collab task
      if (t.source === 'collab') return { label: '协办任务', bg: '#e0f2fe', color: '#0284c7' };

      if (t.status === 'done') return { label: '已完成', bg: 'var(--success-soft)', color: 'var(--success)' };

    changeStatus(t, newStatus) {

      toast('任务状态已更新');
      // Mark relevant todos as done
      if (newStatus === 'progress' && this.currentPlan) {
        const execTodo = store.user_todos.find(td => td.type === 'start_execution' && td.targetId === this.currentPlan.id && !td.done);
        if (execTodo) execTodo.done = true;
        const contTodo = store.user_todos.find(td => td.type === 'continue_task' && td.targetId === (t.taskId || t.id) && !td.done);
        if (contTodo) contTodo.done = true;
      }
      // When a task is marked done, notify the manager for evaluation
      if (newStatus === 'done' && this.currentPlan) {

          createNotification('task_done', 'plan', this.currentPlan.id, '任务已完成，待评估', currentUser().name + '已完成「' + t.title + '」，请进行结果评估', '⭐', 'var(--warning-soft)', [managerId], '/plans/' + this.currentPlan.id);
          // Check if all tasks are now done - count done tasks including this one about to transition
          const doneAfter = this.currentPlan.tasks.filter(tk => tk.status === 'done').length;
          if (doneAfter === this.currentPlan.tasks.length) {
            createTodo(managerId, 'evaluate_tasks', 'plan', this.currentPlan.id, '评估 ' + currentUser().name + ' 的全部任务', this.currentPlan.weekCode + ' 所有任务已完成，请及时评估', '/plans/' + this.currentPlan.id);
          }
        }
        // If this is a collab task, also notify the initiating manager
        if (t.source === 'collab' && t.collabInitiatorId) {
          const initiator = store.users.find(u => u.id === t.collabInitiatorId);

        const mgr = store.users.find(u => u.id === currentUser().id)?.managerId;

          createNotification('task_insert', 'plan', this.currentPlan.id, '新增任务待审批', currentUser().name + '在执行中插入了新任务「' + newTask.title + '」，请审批确认', '📋', 'var(--primary-soft)', [mgr], '/plans/' + this.currentPlan.id);
          createTodo(mgr, 'approve_insert', 'task', newTask.taskId || newTask.id, '审批插入任务「' + newTask.title + '」', currentUser().name + '执行中新增', '/plans/' + this.currentPlan.id);
        }
        createAuditLog('task:insert', 'task', newTask.taskId || newTask.id, currentUser().name + ' 在执行中插入了新任务「' + newTask.title + '」', null, null);
        // If collab dept selected (manager feature), auto-set collab status
        if (this.insertTaskCollabDept) {
          const collabUserId = Number(this.insertTaskCollabDept);
          const collabUser = store.users.find(u => u.id === collabUserId);
          newTask.collabStatus = 'pending_hr';
          newTask.collabNote = '主管直接创建协办任务';
          newTask.collabTargetUserId = collabUserId;
          newTask.collabInitiatorId = currentUser().id;
          newTask.planUserId = currentUser().id;
          newTask.pendingApproval = false; // Manager-created tasks don't need approval
          createNotification('collab_request', 'task', newTask.taskId || newTask.id, '收到协办任务', currentUser().name + '创建了协办任务「' + newTask.title + '」，请查看并接收', '✈', '#f0f9ff', [collabUserId], '/tasks');
          createTodo(collabUserId, 'accept_collab', 'task', newTask.taskId || newTask.id, '接收协办「' + newTask.title + '」', '由' + currentUser().name + '发起', '/tasks');
        }
      }
      this.insertTaskTitle = ''; this.insertTaskDesc = ''; this.insertTaskDeliverable = ''; this.insertTaskProject = '';
      this.insertTaskCollabDept = '';
      this.showInsertTaskModal = false;
      toast(this.isManager ? '✅ 任务已插入' : '✅ 任务已提交，等待主管审批');
    }
  }
};

  data() { return { showReturnModal: false, showEvalModal: false, evalTask: null, evalResult: 'completed', evalScore: 8, evalNewDueDate: '2026-03-22', evalComment: '本周任务完成质量较好，按时交付，后续继续保持。', comment: '任务描述过于笼统，请具体说明各任务的可交付物，并补充完成标准', showAddTask: false, showAddTaskModal: false, expandedTaskId: null, expandedAuxId: null, showCollabModal: false, collabTask: null, collabDept: '', collabNote: '', collabDeliverable: '', collabDeadline: '2026-03-15', showCollabReceiptModal: false, showAssignHandlerModal: false, collabHandlerId: '', collabHandlerName: '李明（行政专员）', collabReceiptNote: '行政人事中心将全力配合，已安排专员联系相关客户，预计3月15日前完成名单对接并提供详细清单。', newTaskType: 'midweek', newTaskTitle: '', newTaskPriority: 'medium', newTaskProject: '', newTaskDue: '2026-03-15', newTaskDesc: '', newTaskDeliverable: '', newTaskReviewer: '', editingTaskId: null, editTitle: '', editDue: '', editPriority: '', showEditTaskModal: false, editTaskObj: null, editProject: '', editDueDate: '', editDesc: '', editDeliverable: '', showFlowLogs: false, collabNewTitle: '', collabNewDeliverable: '', collabNewDue: '2026-03-15', collabNewPriority: 'medium', collabNewProject: '', collabNewDesc: '', newTaskCollabTarget: '', showApproveModal: false, approveComment: '' }; },

      if (!this.plan) return '';
      if (this.canApprove) return '请先核查任务清单，可编辑任务内容，再决定审批通过或退回修改。';
      if (this.canEvaluate) {
        if (this.pendingEvalTaskCount > 0) return '有 ' + this.pendingEvalTaskCount + ' 项任务已完成，请及时进行结果评估。';
        return '等待员工完成任务，完成后将在此处发起结果评估。';
      }
      const s = this.plan.status;
      if (s === 'draft') return '请完善任务清单后提交审批，主管将收到审批通知。';
      if (s === 'submitted') return '计划已提交，等待主管审批通过后即可开始执行。';
      if (s === 'returned') return '计划已被退回，请查看上方退回原因，修改后重新提交。';
      if (s === 'approved') {
        if (this.allTasksDone) return '任务已全部完成，等待主管进行结果评估，评估完成后可前往复盘。';
        return '任务执行中，更新任务状态为已完成，主管将收到评估通知。';
      }
      if (s === 'reviewed') return '本周已完成复盘，可前往复盘页查看沉淀内容。';
      return '';

    flowLogs() {
      if (!this.plan) return [];
      const logs = [];
      const p = this.plan;
      const taskIds = (p.taskIds || []).concat(p.tasks.map(t => t.taskId || t.id));
      const uniqueTaskIds = [...new Set(taskIds)];
      // 1. Plan submission
      if (p.submittedAt) {
        logs.push({ icon: '📤', bg: '#eff6ff', title: p.userName + ' 提交了周计划', detail: '共 ' + p.tasks.length + ' 项任务', time: p.submittedAt });
      }
      // 2. Plan returned (from audit logs)
      if (p.status === 'returned' && p.returnComment) {
        const retLog = store.auditLogs.find(l => l.action === 'plan:return' && l.targetId === p.id);
        const retUser = retLog ? (store.users.find(u => u.id === retLog.actorId)?.name || '') : (p.approvedBy || '主管');
        logs.push({ icon: '↩️', bg: '#fef2f2', title: retUser + ' 退回了计划', detail: p.returnComment, detailBg: '#fef2f2', detailColor: '#dc2626', time: retLog ? new Date(retLog.timestamp).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '' });
      }
      // 3. Plan approved
      if (['approved', 'reviewed'].includes(p.status)) {
        const appLog = store.auditLogs.find(l => l.action === 'plan:approve' && l.targetId === p.id);
        const appUser = p.approvedBy || (appLog ? (store.users.find(u => u.id === appLog.actorId)?.name || '主管') : '主管');
        logs.push({ icon: '✅', bg: '#dcfce7', title: appUser + ' 审批通过', detail: '计划进入执行阶段', time: appLog ? new Date(appLog.timestamp).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '' });
      }
      // 4. Task status changes from task_status_logs
      const taskLogs = store.task_status_logs.filter(l => uniqueTaskIds.includes(l.taskId));
      const statusNames = { todo: '待开始', progress: '执行中', done: '已完成' };
      taskLogs.forEach(l => {
        const task = p.tasks.find(t => (t.taskId || t.id) === l.taskId);
        const user = store.users.find(u => u.id === l.changedBy);
        const taskTitle = task ? task.title : '任务';
        const fromLabel = statusNames[l.fromStatus] || l.fromStatus;
        const toLabel = statusNames[l.toStatus] || l.toStatus;
        let icon = '🔄', bg = '#f3f4f6';
        if (l.toStatus === 'progress') { icon = '▶️'; bg = '#dbeafe'; }
        if (l.toStatus === 'done') { icon = '✔️'; bg = '#dcfce7'; }
        if (l.toStatus === 'todo') { icon = '↩️'; bg = '#fef3c7'; }
        logs.push({ icon, bg, title: (user ? user.name : '') + ' 将「' + taskTitle + '」从' + fromLabel + '改为' + toLabel, time: l.changedAt || '' });
      });
      // 5. Task evaluations
      p.tasks.forEach(t => {
        if (t.reviewResult) {
          const review = store.task_reviews.find(r => r.taskId === (t.taskId || t.id));
          const resultLabels = { completed: '已完成', incomplete: '未完成', authorized_delay: '获权延期' };
          const resultText = resultLabels[t.reviewResult] || t.reviewResult;
          const reviewer = review ? (store.users.find(u => u.id === review.reviewerId)?.name || '主管') : '主管';
          logs.push({ icon: '⭐', bg: '#fef3c7', title: reviewer + ' 评估「' + t.title + '」：' + resultText, detail: review ? review.comment : '', time: review ? review.reviewedAt : '' });
        }
      });
      // 6. Plan review completed
      if (p.status === 'reviewed') {
        const revLog = store.auditLogs.find(l => l.action === 'plan:review' && l.targetId === p.id);
        logs.push({ icon: '📊', bg: '#eff6ff', title: '复盘评价已完成', detail: '本周闭环已完成', time: revLog ? new Date(revLog.timestamp).toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' }) : '' });
      }
      // Sort by time (best effort, some times may be relative like "03-12")
      return logs;
    }
  },

    submitEval() {
      if (this.evalTask) {
        this.evalTask.reviewResult = this.evalResult;

        if (this.evalResult === 'authorized_delay' && this.evalNewDueDate) {
          this.evalTask.authorizedDueDate = this.evalNewDueDate;
          // Auto-carry task to next week plan
          const nextWeek = getWeekCode(store.weekOffset + 1);
          let nextPlan = store.plans.find(p => p.userId === this.plan.userId && p.weekCode === nextWeek);
          if (!nextPlan) {
            nextPlan = { id: Date.now(), userId: this.plan.userId, weekCode: nextWeek, status: 'draft', submittedAt: null, approvedById: null, taskIds: [], tasks: [] };
            patchPlanDisplayFields2(nextPlan);
            store.plans.push(nextPlan);

          if (!nextPlan.tasks) nextPlan.tasks = [];
          const carryTask = { ...this.evalTask, id: Date.now(), taskId: Date.now(), planId: nextPlan.id, status: 'todo', source: 'carried_over', dueDate: this.evalNewDueDate.replace('2026-', ''), reviewResult: null, score: null, authorizedDueDate: null, createdAt: new Date().toISOString(), updatedAt: null };

          nextPlan.tasks.push(carryTask);
